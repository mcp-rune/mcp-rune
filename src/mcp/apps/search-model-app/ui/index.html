<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>Search Results</title>
    <link rel="stylesheet" href="../../shared/base.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="header">
      <div class="header-row">
        <h1 id="list-title">Loading…</h1>
        <span id="selection-info" class="selection-info" style="display: none">
          — <span id="selection-count">0 selected</span>
          <span id="select-all-banner" class="select-all-banner" style="display: none">
            —
            <a href="#" id="btn-select-all-results"
              >Select all <span id="total-results-count"></span> results</a
            >
          </span>
        </span>
        <button
          type="button"
          class="btn-primary"
          id="btn-send-selection"
          style="visibility: hidden"
        >
          Send Selection
        </button>
      </div>
    </div>

    <div class="filter-chips" id="filter-chips" style="display: none"></div>
    <p class="available-filters" id="available-filters" style="display: none"></p>

    <div id="table-container">
      <p class="empty-state" id="empty-state">Loading…</p>
    </div>

    <div class="pagination" id="pagination" style="display: none">
      <button type="button" class="btn-secondary" id="btn-prev" disabled>← Previous</button>
      <span id="page-info">Page 1</span>
      <button type="button" class="btn-secondary" id="btn-next">Next →</button>
    </div>

    <div id="status-bar" class="status-bar"></div>

    <script type="module" src="./app.js"></script>
  </body>
</html>

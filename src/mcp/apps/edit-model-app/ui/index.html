<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>Edit Record</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap"
    />
    <link rel="stylesheet" href="../../shared/base.css" />
    <link rel="stylesheet" href="../../shared/model-form/styles.css" />
  </head>
  <body>
    <div class="mr-titlebar">
      <h1 class="mr-title" id="form-title">Edit Record</h1>
    </div>
    <p class="mr-subtitle" id="form-subtitle">Update the details below</p>

    <form class="mr-form" id="model-form" onsubmit="return false">
      <!-- Fields rendered dynamically by shared/model-form/main.js -->
    </form>

    <div class="mr-actions" id="form-actions" style="display: none">
      <button type="button" class="mr-btn acc" id="btn-done">
        Done <span class="arr">→</span>
      </button>
    </div>

    <div id="status-bar" class="mr-statusbar"></div>

    <script type="module" src="./app.js"></script>
  </body>
</html>

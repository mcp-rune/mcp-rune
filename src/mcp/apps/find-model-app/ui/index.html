<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>Find Records</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap"
    />
    <link rel="stylesheet" href="../../shared/base.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="mr-titlebar">
      <h1 class="mr-title" id="list-title">Loading…</h1>
      <span id="selection-info" class="mr-selcount" style="display: none">
        <span class="dash">—</span><span id="selection-count">0 selected</span>
        <span id="select-all-banner" class="mr-selall" style="display: none">
          <span class="dash">—</span>
          <a href="#" id="btn-select-all-results"
            >Select all <span id="total-results-count"></span> results</a
          >
        </span>
      </span>
      <span style="flex: 1"></span>
      <button type="button" class="mr-btn" id="btn-filters">
        Filters
        <span id="filter-count-badge" class="mr-badge neutral" style="display: none">0</span>
      </button>
      <span id="send-selection-group" style="visibility: hidden; display: inline-flex; gap: 4px">
        <button type="button" class="mr-btn" id="btn-send-add">Add</button>
        <button type="button" class="mr-btn acc" id="btn-send-replace">
          Replace <span class="arr">→</span>
        </button>
      </span>
    </div>

    <div class="mr-badge-row" id="filter-chips" style="display: none"></div>

    <div id="filter-popover" class="mr-popover" style="display: none">
      <div class="mr-popover-rows" id="filter-rows"></div>
      <div class="mr-popover-actions">
        <button type="button" class="mr-btn ghost" id="btn-add-filter">+ Add filter</button>
        <span style="flex: 1"></span>
        <button type="button" class="mr-btn ghost" id="btn-clear-filters">Clear all</button>
        <button type="button" class="mr-btn acc" id="btn-apply-filters">Apply</button>
      </div>
    </div>

    <div id="table-container">
      <div class="mr-empty" id="empty-state">Loading…</div>
    </div>

    <div class="mr-pager" id="pagination" style="display: none">
      <button type="button" class="mr-pgbtn" id="btn-prev" disabled>
        <span class="a">←</span> Previous
      </button>
      <span class="page" id="page-info">Page <b>1</b></span>
      <button type="button" class="mr-pgbtn" id="btn-next">Next <span class="a">→</span></button>
    </div>

    <div id="status-bar" class="mr-statusbar"></div>

    <script type="module" src="./app.js"></script>
  </body>
</html>

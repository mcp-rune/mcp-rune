# CI for @mcp-rune/mcp-rune.
#
# Triggers:
#   - push to master         → runs `ci` job
#   - push of a `v*` tag     → runs `ci`, and on success runs `publish`
#
# No `pull_request` trigger. PRs do not consume Actions minutes. Pre-merge
# checks happen locally via husky + lint-staged (see package.json). If
# something slips past local checks, master CI catches it on push; tag/publish
# is gated by `needs: ci` so a red master cannot publish.

name: CI

on:
  push:
    branches: [master]
    tags: ['v*']

jobs:
  ci:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run build:check

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  publish:
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          # registry-url + scope tell setup-node to write a project .npmrc
          # that maps the @mcp-rune scope to GitHub Packages and reads
          # the token from $NODE_AUTH_TOKEN at publish time.
          registry-url: https://npm.pkg.github.com
          scope: '@mcp-rune'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        # `build:full` chains `build:all-apps` (6 Vite bundles) + `tsc` +
        # `copy:app-html` to produce the complete publishable artifact
        # (dist/ + dist/mcp/apps/dist/*.html). `npm publish` re-runs this
        # via the `prepublishOnly` hook; this explicit step surfaces build
        # failures before the publish attempt.
        run: npm run build:full

      - name: Publish
        run: npm publish
        env:
          # GITHUB_TOKEN is auto-provisioned by Actions. With permissions:
          # packages: write, it has push rights to npm.pkg.github.com for
          # this repo's scope.
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

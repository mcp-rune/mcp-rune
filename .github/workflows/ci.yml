# CI for @mcp-rune/mcp-rune.
#
# Triggers:
#   - push to master         → runs `ci` job
#   - push of a `v*` tag     → runs `ci`, and on success runs `publish`
#
# No `pull_request` trigger. PRs do not consume Actions minutes. Pre-merge
# checks happen locally via husky + lint-staged (see package.json). If
# something slips past local checks, master CI catches it on push; tag/publish
# is gated by `needs: ci` so a red master cannot publish.

name: CI

on:
  push:
    branches: [master]
    tags: ['v*']

jobs:
  ci:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        # Hard-fails master CI (and, via `needs: ci`, publish) on high+critical
        # advisories anywhere in the tree. Moderate/low drift is surfaced as
        # Dependabot PRs (.github/dependabot.yml) rather than blocking here, so
        # an unfixable transitive moderate can't wedge releases. Raise the
        # threshold by lowering --audit-level if a tighter gate is wanted.
        run: npm audit --audit-level=high

      - name: Type check
        run: npm run build:check

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Build
        # `build:full` chains `build:all-apps` (7 Vite bundles) + `tsc` +
        # `copy:app-html` to produce the complete publishable artifact.
        # Tests need it: `bundle-coverage.spec.ts` reads
        # `dist/mcp/apps/dist/new-model-app.html` and `edit-model-app.html`
        # to assert every server-emitted field.type has a matching
        # `case "X"` arm in the bundled client.
        run: npm run build:full

      - name: Test
        run: npm test

      - name: Tutorial stamps in sync
        # Cheap, offline: asserts every executable tutorial's "Verified
        # against" stamp matches docs/verified-with.json + package.json. The
        # `docs-verify` job below proves the tutorials actually run.
        run: npm run docs:stamp:check

  docs-verify:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify executable tutorials
        # Scaffolds each getting-started guide in a temp dir against the pinned
        # @mcp-rune/create, links the working-tree framework on top (so a red
        # build means THIS branch broke the tutorial, not the published
        # release), and asserts the documented MCP tool outputs. global-setup
        # runs build:full + npm pack. Kept off the publish critical path
        # (publish is gated by `needs: ci`) since it hits the network.
        run: npm run docs:verify

  publish:
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # id-token: write lets `npm publish --provenance` OIDC-sign the
      # tarball against this Actions run, so npmjs.com can show a
      # verifiable link back to the source commit.
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          # registry-url + scope make setup-node write a project .npmrc
          # mapping the @mcp-rune scope to npmjs.com. This overrides
          # package.json's publishConfig at runtime — keep both aligned.
          registry-url: https://registry.npmjs.org
          scope: '@mcp-rune'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        # `build:full` chains `build:all-apps` (6 Vite bundles) + `tsc` +
        # `copy:app-html` to produce the complete publishable artifact
        # (dist/ + dist/mcp/apps/dist/*.html). `npm publish` re-runs this
        # via the `prepublishOnly` hook; this explicit step surfaces build
        # failures before the publish attempt.
        run: npm run build:full

      - name: Publish
        run: npm publish --provenance --access public
        env:
          # NPM_TOKEN is an npm automation token (granular or classic) with
          # publish rights to the @mcp-rune scope on registry.npmjs.org.
          # Add it under repo Settings → Secrets and variables → Actions.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

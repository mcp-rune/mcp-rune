# CI for @mcp-rune/mcp-rune.
#
# Triggers:
#   - push to master         → runs `ci` job
#   - push of a `v*` tag     → runs `ci`, and on success runs `publish`
#
# No `pull_request` trigger. PRs do not consume Actions minutes. Pre-merge
# checks happen locally via husky + lint-staged (see package.json). If
# something slips past local checks, master CI catches it on push; tag/publish
# is gated by `needs: ci` so a red master cannot publish.

name: CI

on:
  push:
    branches: [master]
    tags: ['v*']

jobs:
  ci:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run build:check

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Build
        # `build:full` chains `build:all-apps` (7 Vite bundles) + `tsc` +
        # `copy:app-html` to produce the complete publishable artifact.
        # Tests need it: `bundle-coverage.spec.ts` reads
        # `dist/mcp/apps/dist/new-model-app.html` and `edit-model-app.html`
        # to assert every server-emitted field.type has a matching
        # `case "X"` arm in the bundled client.
        run: npm run build:full

      - name: Test
        run: npm test

  publish:
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # id-token: write lets `npm publish --provenance` OIDC-sign the
      # tarball against this Actions run, so npmjs.com can show a
      # verifiable link back to the source commit.
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          # registry-url + scope make setup-node write a project .npmrc
          # mapping the @mcp-rune scope to npmjs.com. This overrides
          # package.json's publishConfig at runtime — keep both aligned.
          registry-url: https://registry.npmjs.org
          scope: '@mcp-rune'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        # `build:full` chains `build:all-apps` (6 Vite bundles) + `tsc` +
        # `copy:app-html` to produce the complete publishable artifact
        # (dist/ + dist/mcp/apps/dist/*.html). `npm publish` re-runs this
        # via the `prepublishOnly` hook; this explicit step surfaces build
        # failures before the publish attempt.
        run: npm run build:full

      - name: Publish
        run: npm publish --provenance --access public
        env:
          # NPM_TOKEN is an npm automation token (granular or classic) with
          # publish rights to the @mcp-rune scope on registry.npmjs.org.
          # Add it under repo Settings → Secrets and variables → Actions.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

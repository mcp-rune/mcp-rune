<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 410" width="880" height="410" font-family="'Geist Mono',ui-monospace,monospace" role="img" aria-label="Boot: createServer with toolFlowExtensions registers the extension, which in register(ctx) registers its tool, sets form submit mode to collect, and provides a context store, then the tool registry is sealed. Per tool call: the LLM invokes new_model_app, the form data is collected (because submitMode is collect), the extension's own tool (e.g. review_approval) runs, its handler reads KEY from context and decides to submit or reject, then resumes the CRUD write via DataLayer."><rect x="0.5" y="0.5" width="879" height="409" rx="14" fill="#0c0c12" stroke="#23232f"></rect><text x="28" y="32" font-size="11" fill="#6a6a78" letter-spacing="0.08em" xml:space="preserve">TOOL FLOW EXTENSION · BOOT &amp; PER-CALL</text><text x="40" y="44" font-size="11" fill="#a78bfa" letter-spacing="0.1em" xml:space="preserve">BOOT</text><line x1="40" y1="52" x2="130" y2="52" stroke="#a78bfa" stroke-width="1"></line><rect x="40" y="64" width="360" height="52" rx="9" fill="#14141e" stroke="#2a2a38"></rect><rect x="40" y="64" width="3" height="52" rx="1.5" fill="#7c5cff"></rect><text x="58" y="88" font-size="11.5" fill="#e7e7ee" xml:space="preserve">createServer({</text><text x="58" y="106" font-size="11.5" fill="#a78bfa" xml:space="preserve">  toolFlowExtensions: [ myExt ]</text><text x="58" y="124" font-size="11.5" fill="#e7e7ee" xml:space="preserve">})</text><line x1="220" y1="116" x2="220" y2="140" stroke="#4a4a5e" stroke-width="1.5"></line><path d="M215 134 L220 142 L225 134 Z" fill="#7c5cff"></path><rect x="40" y="140" width="360" height="86" rx="9" fill="#14141e" stroke="#2a2a38"></rect><rect x="40" y="140" width="3" height="86" rx="1.5" fill="#7c5cff"></rect><text x="58" y="164" font-size="12.5" fill="#e7e7ee" xml:space="preserve">register(ctx)</text><text x="58" y="182" font-size="11.5" fill="#9a9aa8" xml:space="preserve">ctx.registerTool(...)</text><text x="58" y="200" font-size="11.5" fill="#a78bfa" xml:space="preserve">ctx.setFormSubmitMode('collect')</text><text x="58" y="218" font-size="11.5" fill="#9a9aa8" xml:space="preserve">ctx.provideContext(KEY, store)</text><line x1="220" y1="226" x2="220" y2="250" stroke="#4a4a5e" stroke-width="1.5"></line><path d="M215 244 L220 252 L225 244 Z" fill="#7c5cff"></path><rect x="40" y="250" width="360" height="40" rx="9" fill="#14141e" stroke="#2a2a38"></rect><rect x="40" y="250" width="3" height="40" rx="1.5" fill="#4a4a5e"></rect><text x="58" y="274" font-size="12" fill="#6a6a78" xml:space="preserve">tool registry sealed</text><text x="480" y="44" font-size="11" fill="#7ee2c1" letter-spacing="0.1em" xml:space="preserve">PER TOOL CALL</text><line x1="480" y1="52" x2="570" y2="52" stroke="#7ee2c1" stroke-width="1"></line><rect x="480" y="64" width="360" height="40" rx="9" fill="#14141e" stroke="#2a2a38"></rect><rect x="480" y="64" width="3" height="40" rx="1.5" fill="#8aa6ff"></rect><text x="498" y="88" font-size="12.5" fill="#e7e7ee" xml:space="preserve">LLM invokes new_model_app(...)</text><line x1="660" y1="104" x2="660" y2="128" stroke="#4a4a5e" stroke-width="1.5"></line><path d="M655 122 L660 130 L665 122 Z" fill="#7c5cff"></path><rect x="480" y="128" width="360" height="62" rx="9" fill="#14141e" stroke="#2a2a38"></rect><rect x="480" y="128" width="3" height="62" rx="1.5" fill="#7ee2c1"></rect><text x="498" y="152" font-size="12.5" fill="#e7e7ee" xml:space="preserve">collect form data</text><text x="498" y="170" font-size="11.5" fill="#9a9aa8" xml:space="preserve">because submitMode = 'collect'</text><line x1="660" y1="190" x2="660" y2="214" stroke="#4a4a5e" stroke-width="1.5"></line><path d="M655 208 L660 216 L665 208 Z" fill="#7c5cff"></path><rect x="480" y="214" width="360" height="44" rx="9" fill="#14141e" stroke="#2a2a38"></rect><rect x="480" y="214" width="3" height="44" rx="1.5" fill="#f0c674"></rect><text x="498" y="238" font-size="12.5" fill="#e7e7ee" xml:space="preserve">Extension's own tool</text><text x="498" y="256" font-size="11.5" fill="#f0c674" xml:space="preserve">e.g. review_approval</text><line x1="660" y1="258" x2="660" y2="282" stroke="#4a4a5e" stroke-width="1.5"></line><path d="M655 276 L660 284 L665 276 Z" fill="#7c5cff"></path><rect x="480" y="282" width="360" height="44" rx="9" fill="#14141e" stroke="#2a2a38"></rect><rect x="480" y="282" width="3" height="44" rx="1.5" fill="#7c5cff"></rect><text x="498" y="306" font-size="11.5" fill="#c7c7d1" xml:space="preserve">Handler reads KEY from context,</text><text x="498" y="324" font-size="11.5" fill="#c7c7d1" xml:space="preserve">decides to submit or reject</text><line x1="660" y1="326" x2="660" y2="350" stroke="#4a4a5e" stroke-width="1.5"></line><path d="M655 344 L660 352 L665 344 Z" fill="#7ee2c1"></path><rect x="480" y="350" width="360" height="40" rx="9" fill="#14141e" stroke="#2a2a38"></rect><rect x="480" y="350" width="3" height="40" rx="1.5" fill="#7ee2c1"></rect><text x="498" y="374" font-size="12.5" fill="#7ee2c1" xml:space="preserve">Resume CRUD via DataLayer</text></svg>
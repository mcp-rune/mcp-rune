<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 500" width="560" height="500" font-family="'Geist Mono',ui-monospace,monospace" role="img" aria-label="Per-request API client lifecycle: an incoming MCP tool request and the per-session OAuthService combine via sessionId into getValidAccessToken, which yields a token; createApiClient builds an ApiClient that lives for one request; the tool or app handler then calls apiClient.get/post."><rect x="0.5" y="0.5" width="559" height="499" rx="14" fill="#0c0c12" stroke="#23232f"></rect><text x="28" y="32" font-size="11" fill="#6a6a78" letter-spacing="0.08em" xml:space="preserve">PER-REQUEST CLIENT LIFECYCLE</text><rect x="44" y="50" width="212" height="60" rx="9" fill="#14141e" stroke="#2a2a38"></rect><text x="60" y="78" font-size="12.5" fill="#e7e7ee" xml:space="preserve">Incoming MCP</text><text x="60" y="96" font-size="12.5" fill="#9a9aa8" xml:space="preserve">tool request</text><rect x="304" y="50" width="212" height="60" rx="9" fill="#14141e" stroke="#2a2a38"></rect><text x="320" y="78" font-size="12.5" fill="#e7e7ee" xml:space="preserve">OAuthService</text><text x="320" y="96" font-size="12.5" fill="#9a9aa8" xml:space="preserve">(per session)</text><path d="M150 110 V134 H410 V110" fill="none" stroke="#383848" stroke-width="1.25"></path><rect x="236" y="122" width="88" height="20" rx="10" fill="#0c0c12"></rect><text x="280" y="136" font-size="10.5" fill="#9a9aa8" text-anchor="middle" xml:space="preserve">sessionId</text><path d="M280 134 V160" fill="none" stroke="#7c5cff" stroke-width="1.75"></path><path d="M274 156 L280 168 L286 156 Z" fill="#7c5cff"></path><rect x="120" y="170" width="320" height="84" rx="9" fill="#14141e" stroke="#2a2a38"></rect><rect x="120" y="170" width="3" height="84" rx="1.5" fill="#7c5cff"></rect><text x="142" y="198" font-size="12.5" fill="#a78bfa" xml:space="preserve">getValidAccessToken(sessionId)</text><text x="142" y="220" font-size="12" fill="#e7e7ee" xml:space="preserve">→ token</text><text x="142" y="240" font-size="11" fill="#9a9aa8" xml:space="preserve">auto-refresh · 5 min expiry buffer</text><path d="M280 254 V286" fill="none" stroke="#7c5cff" stroke-width="1.75"></path><path d="M274 282 L280 294 L286 282 Z" fill="#7c5cff"></path><rect x="120" y="296" width="320" height="72" rx="9" fill="#14141e" stroke="#2a2a38"></rect><rect x="120" y="296" width="3" height="72" rx="1.5" fill="#7c5cff"></rect><text x="142" y="324" font-size="12.5" fill="#a78bfa" xml:space="preserve">createApiClient(token, { apiUrl })</text><text x="142" y="346" font-size="12" fill="#e7e7ee" xml:space="preserve">→ ApiClient instance</text><path d="M280 368 V400" fill="none" stroke="#7c5cff" stroke-width="1.75"></path><path d="M274 396 L280 408 L286 396 Z" fill="#7c5cff"></path><path d="M298 374 h10 v20 h-10" fill="none" stroke="#383848" stroke-width="1.25"></path><text x="314" y="388" font-size="10.5" fill="#7ee2c1" xml:space="preserve">lifetime = ONE request</text><rect x="120" y="410" width="320" height="68" rx="9" fill="#14141e" stroke="#2a2a38"></rect><text x="142" y="438" font-size="12.5" fill="#e7e7ee" xml:space="preserve">Tool / App handler</text><text x="142" y="460" font-size="12" fill="#a78bfa" xml:space="preserve">apiClient.get / post / …</text></svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 526" width="720" height="526" font-family="'Geist Mono',ui-monospace,monospace" role="img" aria-label="EndpointResolver tests, in order: a per-action override (api.endpoints[action]), a collection override (api.endpoint), a parent path (api.parent), a namespace (api.namespace); the first yes yields that URL, otherwise it falls through to the default which pluralizes the model name, e.g. book becomes /books."><rect x="0.5" y="0.5" width="719" height="525" rx="14" fill="#0c0c12" stroke="#23232f"></rect><text x="28" y="32" font-size="11" fill="#6a6a78" letter-spacing="0.08em" xml:space="preserve">ENDPOINTRESOLVER · FIVE-STEP CHAIN</text><text x="210" y="46" font-size="12" fill="#c7c7d1" text-anchor="middle" xml:space="preserve">Resolve endpoint for (model, action)</text><line x1="210" y1="54" x2="210" y2="80" stroke="#4a4a5e" stroke-width="1.5"></line><path d="M205 74 L210 82 L215 74 Z" fill="#7c5cff"></path><rect x="60" y="86" width="300" height="56" rx="9" fill="#14141e" stroke="#2a2a38"></rect><text x="78" y="110" font-size="12.5" fill="#e7e7ee" xml:space="preserve">Per-action override?</text><text x="78" y="128" font-size="11" fill="#a78bfa" xml:space="preserve">api.endpoints[&lt;action&gt;]</text><text x="394" y="104" font-size="10.5" fill="#7ee2c1" xml:space="preserve">yes</text><line x1="360" y1="114" x2="420" y2="114" stroke="#4a4a5e" stroke-width="1.5"></line><path d="M414 109 L422 114 L414 119 Z" fill="#7ee2c1"></path><rect x="426" y="100" width="260" height="28" rx="7" fill="#7ee2c1" fill-opacity="0.06" stroke="#2f6e57"></rect><text x="440" y="118" font-size="11.5" fill="#7ee2c1" xml:space="preserve">endpoints[&lt;action&gt;]</text><text x="218" y="160" font-size="10" fill="#6a6a78" xml:space="preserve">no</text><line x1="210" y1="142" x2="210" y2="172" stroke="#4a4a5e" stroke-width="1.5"></line><path d="M205 166 L210 174 L215 166 Z" fill="#7c5cff"></path><rect x="60" y="172" width="300" height="56" rx="9" fill="#14141e" stroke="#2a2a38"></rect><text x="78" y="196" font-size="12.5" fill="#e7e7ee" xml:space="preserve">Collection override?</text><text x="78" y="214" font-size="11" fill="#a78bfa" xml:space="preserve">api.endpoint</text><text x="394" y="190" font-size="10.5" fill="#7ee2c1" xml:space="preserve">yes</text><line x1="360" y1="200" x2="420" y2="200" stroke="#4a4a5e" stroke-width="1.5"></line><path d="M414 195 L422 200 L414 205 Z" fill="#7ee2c1"></path><rect x="426" y="186" width="260" height="28" rx="7" fill="#7ee2c1" fill-opacity="0.06" stroke="#2f6e57"></rect><text x="440" y="204" font-size="11.5" fill="#7ee2c1" xml:space="preserve">api.endpoint</text><text x="218" y="246" font-size="10" fill="#6a6a78" xml:space="preserve">no</text><line x1="210" y1="228" x2="210" y2="258" stroke="#4a4a5e" stroke-width="1.5"></line><path d="M205 252 L210 260 L215 252 Z" fill="#7c5cff"></path><rect x="60" y="258" width="300" height="56" rx="9" fill="#14141e" stroke="#2a2a38"></rect><text x="78" y="282" font-size="12.5" fill="#e7e7ee" xml:space="preserve">Parent path?</text><text x="78" y="300" font-size="11" fill="#a78bfa" xml:space="preserve">api.parent</text><text x="394" y="276" font-size="10.5" fill="#7ee2c1" xml:space="preserve">yes</text><line x1="360" y1="286" x2="420" y2="286" stroke="#4a4a5e" stroke-width="1.5"></line><path d="M414 281 L422 286 L414 291 Z" fill="#7ee2c1"></path><rect x="426" y="272" width="260" height="28" rx="7" fill="#7ee2c1" fill-opacity="0.06" stroke="#2f6e57"></rect><text x="440" y="290" font-size="11.5" fill="#7ee2c1" xml:space="preserve">parent.endpoint + own</text><text x="218" y="332" font-size="10" fill="#6a6a78" xml:space="preserve">no</text><line x1="210" y1="314" x2="210" y2="344" stroke="#4a4a5e" stroke-width="1.5"></line><path d="M205 338 L210 346 L215 338 Z" fill="#7c5cff"></path><rect x="60" y="344" width="300" height="56" rx="9" fill="#14141e" stroke="#2a2a38"></rect><text x="78" y="368" font-size="12.5" fill="#e7e7ee" xml:space="preserve">Namespace?</text><text x="78" y="386" font-size="11" fill="#a78bfa" xml:space="preserve">api.namespace</text><text x="394" y="362" font-size="10.5" fill="#7ee2c1" xml:space="preserve">yes</text><line x1="360" y1="372" x2="420" y2="372" stroke="#4a4a5e" stroke-width="1.5"></line><path d="M414 367 L422 372 L414 377 Z" fill="#7ee2c1"></path><rect x="426" y="358" width="260" height="28" rx="7" fill="#7ee2c1" fill-opacity="0.06" stroke="#2f6e57"></rect><text x="440" y="376" font-size="11.5" fill="#7ee2c1" xml:space="preserve">namespace + default</text><text x="218" y="418" font-size="10" fill="#6a6a78" xml:space="preserve">no</text><line x1="210" y1="400" x2="210" y2="430" stroke="#4a4a5e" stroke-width="1.5"></line><path d="M205 424 L210 432 L215 424 Z" fill="#7c5cff"></path><rect x="60" y="430" width="300" height="74" rx="9" fill="#1c1c28" stroke="#4a4a5e"></rect><rect x="60" y="430" width="3" height="74" rx="1.5" fill="#f0c674"></rect><text x="78" y="454" font-size="12.5" fill="#f0c674" xml:space="preserve">Default</text><text x="78" y="474" font-size="11.5" fill="#c7c7d1" xml:space="preserve">pluralize(model name)</text><text x="78" y="492" font-size="11.5" fill="#9a9aa8" xml:space="preserve">"book" → /books</text></svg>
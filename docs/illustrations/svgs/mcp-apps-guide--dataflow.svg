<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 470" width="860" height="470" font-family="'Geist Mono',ui-monospace,monospace" role="img" aria-label="The MCP server derives a form schema from model attributes, associations, field groups and sections via the pure generateFormSchema(); association fields trigger API option lookups; the schema crosses to the generic form app via ontoolresult."><rect x="0.5" y="0.5" width="859" height="469" rx="14" fill="#0c0c12" stroke="#23232f"></rect><text x="28" y="32" font-size="11" fill="#6a6a78" letter-spacing="0.08em" xml:space="preserve">GENERIC MODEL FORM · DATA FLOW</text><rect x="24" y="56" width="812" height="236" rx="12" fill="#101019" stroke="#2a2a38"></rect><circle cx="44" cy="82" r="4" fill="#7c5cff"></circle><text x="56" y="86" font-size="12" fill="#c9b8ff" letter-spacing="0.12em" xml:space="preserve">MCP SERVER</text><text x="48" y="110" font-size="12" fill="#e7e7ee" xml:space="preserve">Book.attributes</text><text x="300" y="110" font-size="11.5" fill="#9a9aa8" xml:space="preserve">→ field types, validations, enums</text><text x="48" y="134" font-size="12" fill="#e7e7ee" xml:space="preserve">Book.associations</text><text x="300" y="134" font-size="11.5" fill="#9a9aa8" xml:space="preserve">→ which fields need API options</text><text x="48" y="158" font-size="12" fill="#e7e7ee" xml:space="preserve">BookPrompt.fieldGroups</text><text x="300" y="158" font-size="11.5" fill="#9a9aa8" xml:space="preserve">→ field grouping (fieldsets)</text><text x="48" y="182" font-size="12" fill="#e7e7ee" xml:space="preserve">BookPrompt.sections</text><text x="300" y="182" font-size="11.5" fill="#9a9aa8" xml:space="preserve">→ section titles, ordering</text><line x1="44" y1="198" x2="816" y2="198" stroke="#2a2a38" stroke-width="1" stroke-dasharray="2 4"></line><text x="48" y="222" font-size="12.5" fill="#a78bfa" xml:space="preserve">generateFormSchema()</text><text x="300" y="222" font-size="11.5" fill="#7ee2c1" xml:space="preserve">→ JSON schema · pure, no API</text><rect x="48" y="236" width="768" height="46" rx="8" fill="#0c0c12" stroke="#2a2a38"></rect><text x="64" y="256" font-size="10.5" fill="#6a6a78" xml:space="preserve">For association fields only:</text><text x="64" y="274" font-size="11" fill="#f0c674" xml:space="preserve">apiClient.get('/locations') → select options</text><text x="430" y="274" font-size="11" fill="#f0c674" xml:space="preserve">apiClient.get('/tags') → multiselect options</text><line x1="440" y1="292" x2="440" y2="346" stroke="#4a4a5e" stroke-width="1.5"></line><path d="M436 298 L440 292 L444 298 Z" fill="#7ee2c1"></path><path d="M436 340 L440 346 L444 340 Z" fill="#7ee2c1"></path><rect x="369.1" y="308" width="141.8" height="22" rx="11" fill="#0c0c12" stroke="#383848"></rect><text x="440" y="323" font-size="10.5" fill="#7ee2c1" text-anchor="middle" xml:space="preserve">JSON · ontoolresult</text><rect x="24" y="346" width="812" height="104" rx="12" fill="#101019" stroke="#2a2a38"></rect><circle cx="44" cy="372" r="4" fill="#7ee2c1"></circle><text x="56" y="376" font-size="12" fill="#7ee2c1" letter-spacing="0.12em" xml:space="preserve">GENERIC FORM MCP APP</text><text x="48" y="392" font-size="12" fill="#c7c7d1" xml:space="preserve">Receives schema → dynamically renders form</text><text x="48" y="414" font-size="11.5" fill="#9a9aa8" xml:space="preserve">Validates via callServerTool('validate_form')</text><text x="48" y="434" font-size="11.5" fill="#9a9aa8" xml:space="preserve">Submits via callServerTool('create_model')</text></svg>
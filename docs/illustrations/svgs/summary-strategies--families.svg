<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 378" width="880" height="378" font-family="'Geist Mono',ui-monospace,monospace" role="img" aria-label="Nine summary strategies split into two families: field-level (5) — distribution, coverage, anomaly, temporal, entity-extraction — which run on records only and always run; and GraphRAG-aware (4) — relationship-coverage (requires edges), concept-touch (requires edges and domain), rule-violation (requires domain), semantic-cluster (requires embeddings) — which run only when the dispatcher can load the required auxiliary data."><rect x="0.5" y="0.5" width="879" height="377" rx="14" fill="#0c0c12" stroke="#23232f"></rect><text x="28" y="32" font-size="11" fill="#6a6a78" letter-spacing="0.08em" xml:space="preserve">9 SUMMARY STRATEGIES · TWO FAMILIES</text><rect x="28" y="52" width="396" height="268" rx="11" fill="#14141e" stroke="#2a2a38"></rect><rect x="28" y="52" width="396" height="40" rx="11" fill="#1c1c28"></rect><rect x="28" y="80" width="396" height="12" fill="#1c1c28"></rect><text x="48" y="78" font-size="13" fill="#8aa6ff">Field-level <tspan fill="#6a6a78">(5)</tspan></text><text x="404" y="78" font-size="11" fill="#6a6a78" text-anchor="end" xml:space="preserve">records only</text><circle cx="58" cy="116" r="3" fill="#8aa6ff"></circle><text x="74" y="120" font-size="12.5" fill="#e7e7ee">distribution</text><circle cx="58" cy="148" r="3" fill="#8aa6ff"></circle><text x="74" y="152" font-size="12.5" fill="#e7e7ee">coverage</text><circle cx="58" cy="180" r="3" fill="#8aa6ff"></circle><text x="74" y="184" font-size="12.5" fill="#e7e7ee">anomaly</text><circle cx="58" cy="212" r="3" fill="#8aa6ff"></circle><text x="74" y="216" font-size="12.5" fill="#e7e7ee">temporal</text><circle cx="58" cy="244" r="3" fill="#8aa6ff"></circle><text x="74" y="248" font-size="12.5" fill="#e7e7ee">entity-extraction</text><line x1="48" y1="290" x2="404" y2="290" stroke="#2a2a38" stroke-dasharray="2 4"></line><text x="48" y="310" font-size="10.5" fill="#7ee2c1">always runs <tspan fill="#6a6a78">· or simple shape gate</tspan></text><rect x="456" y="52" width="396" height="268" rx="11" fill="#14141e" stroke="#2a2a38"></rect><rect x="456" y="52" width="396" height="40" rx="11" fill="#1c1c28"></rect><rect x="456" y="80" width="396" height="12" fill="#1c1c28"></rect><text x="476" y="78" font-size="13" fill="#a78bfa">GraphRAG-aware <tspan fill="#6a6a78">(4)</tspan></text><text x="832" y="78" font-size="11" fill="#6a6a78" text-anchor="end" xml:space="preserve">records + auxiliary</text><circle cx="486" cy="114" r="3" fill="#a78bfa"></circle><text x="502" y="118" font-size="12.5" fill="#e7e7ee">relationship-coverage</text><text x="516" y="135" font-size="10.5" fill="#f0c674">requires: edges</text><circle cx="486" cy="156" r="3" fill="#a78bfa"></circle><text x="502" y="160" font-size="12.5" fill="#e7e7ee">concept-touch</text><text x="516" y="177" font-size="10.5" fill="#f0c674">requires: edges + domain</text><circle cx="486" cy="198" r="3" fill="#a78bfa"></circle><text x="502" y="202" font-size="12.5" fill="#e7e7ee">rule-violation</text><text x="516" y="219" font-size="10.5" fill="#f0c674">requires: domain</text><circle cx="486" cy="240" r="3" fill="#a78bfa"></circle><text x="502" y="244" font-size="12.5" fill="#e7e7ee">semantic-cluster</text><text x="516" y="261" font-size="10.5" fill="#f0c674">requires: embeddings</text><line x1="476" y1="290" x2="832" y2="290" stroke="#2a2a38" stroke-dasharray="2 4"></line><text x="476" y="310" font-size="10.5" fill="#6a6a78" xml:space="preserve">only when the dispatcher can load the required auxiliary data</text></svg>
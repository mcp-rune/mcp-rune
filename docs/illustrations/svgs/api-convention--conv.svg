<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 492" width="860" height="492" font-family="'Geist Mono',ui-monospace,monospace" role="img" aria-label="An internal Book record with a belongsTo author and hasMany tags serializes two ways: HAL emits author_link plus author_id and tag_ids; JSON:API nests data with type, attributes and relationships objects."><rect x="0.5" y="0.5" width="859" height="491" rx="14" fill="#0c0c12" stroke="#23232f"></rect><text x="28" y="32" font-size="11" fill="#6a6a78" letter-spacing="0.08em" xml:space="preserve">CONVENTION · WIRE SHAPES</text><text x="430" y="46" font-size="11" fill="#6a6a78" text-anchor="middle" letter-spacing="0.08em" xml:space="preserve">Internal record</text><rect x="300" y="56" width="260" height="128" rx="10" fill="#14141e" stroke="#2a2a38"></rect><rect x="300" y="56" width="260" height="28" rx="10" fill="#1c1c28"></rect><rect x="300" y="74" width="260" height="10" fill="#1c1c28"></rect><circle cx="316" cy="70" r="3.5" fill="#a78bfa"></circle><text x="328" y="74" font-size="11" fill="#a78bfa" xml:space="preserve">record</text><text x="318" y="106" font-size="11" fill="#c7c7d1" xml:space="preserve">Book {</text><text x="318" y="124" font-size="11" fill="#c7c7d1" xml:space="preserve">  title: "Clean Code",</text><text x="318" y="142" font-size="11" fill="#a78bfa" xml:space="preserve"> author: &lt;Author#7&gt;,</text><text x="318" y="160" font-size="11" fill="#a78bfa" xml:space="preserve"> tags: [&lt;Tag#1&gt;, &lt;Tag#3&gt;]</text><text x="318" y="178" font-size="11" fill="#c7c7d1" xml:space="preserve">}</text><text x="474" y="118" font-size="9.5" fill="#6a6a78" xml:space="preserve">← belongsTo</text><text x="474" y="136" font-size="9.5" fill="#6a6a78" xml:space="preserve">← hasMany</text><line x1="430" y1="184" x2="430" y2="206" stroke="#4a4a5e" stroke-width="1.4"></line><line x1="220" y1="206" x2="610" y2="206" stroke="#4a4a5e" stroke-width="1.4"></line><line x1="220" y1="206" x2="220" y2="228" stroke="#4a4a5e" stroke-width="1.4"></line><path d="M216 224 L220 232 L224 224 Z" fill="#f0c674"></path><line x1="610" y1="206" x2="610" y2="228" stroke="#4a4a5e" stroke-width="1.4"></line><path d="M606 224 L610 232 L614 224 Z" fill="#8aa6ff"></path><rect x="40" y="236" width="380" height="232" rx="10" fill="#14141e" stroke="#2a2a38"></rect><rect x="40" y="236" width="380" height="28" rx="10" fill="#1c1c28"></rect><rect x="40" y="254" width="380" height="10" fill="#1c1c28"></rect><circle cx="56" cy="250" r="3.5" fill="#f0c674"></circle><text x="68" y="254" font-size="11" fill="#f0c674" xml:space="preserve">HAL</text><text x="58" y="286" font-size="11" fill="#9a9aa8" xml:space="preserve">{</text><text x="58" y="304" font-size="11" fill="#c7c7d1" xml:space="preserve">  title: "...",</text><text x="58" y="322" font-size="11" fill="#7ee2c1" xml:space="preserve">  author_link: "/authors/7",</text><text x="58" y="340" font-size="11" fill="#c7c7d1" xml:space="preserve">  author_id: 7,</text><text x="58" y="358" font-size="11" fill="#c7c7d1" xml:space="preserve">  tag_ids: [1, 3]</text><text x="58" y="376" font-size="11" fill="#9a9aa8" xml:space="preserve">}</text><text x="58" y="412" font-size="11" fill="#f0c674" xml:space="preserve">belongsTo: {rel}_link + {rel}_id</text><text x="58" y="430" font-size="11" fill="#f0c674" xml:space="preserve">hasMany:   {singular}_ids[]</text><rect x="440" y="236" width="380" height="232" rx="10" fill="#14141e" stroke="#2a2a38"></rect><rect x="440" y="236" width="380" height="28" rx="10" fill="#1c1c28"></rect><rect x="440" y="254" width="380" height="10" fill="#1c1c28"></rect><circle cx="456" cy="250" r="3.5" fill="#8aa6ff"></circle><text x="468" y="254" font-size="11" fill="#8aa6ff" xml:space="preserve">JSON:API</text><text x="458" y="286" font-size="11" fill="#9a9aa8" xml:space="preserve">{</text><text x="458" y="304" font-size="11" fill="#c7c7d1" xml:space="preserve">  data: {</text><text x="458" y="322" font-size="11" fill="#7ee2c1" xml:space="preserve">    type: "books",</text><text x="458" y="340" font-size="11" fill="#c7c7d1" xml:space="preserve">    attributes: { title: "..." },</text><text x="458" y="358" font-size="11" fill="#a78bfa" xml:space="preserve">    relationships: {</text><text x="458" y="376" font-size="11" fill="#c7c7d1" xml:space="preserve">      author: { data: { id: "7" } },</text><text x="458" y="394" font-size="11" fill="#c7c7d1" xml:space="preserve">      tags:   { data: [...] }</text><text x="458" y="412" font-size="11" fill="#a78bfa" xml:space="preserve">    }</text><text x="458" y="430" font-size="11" fill="#c7c7d1" xml:space="preserve">  }</text><text x="458" y="448" font-size="11" fill="#9a9aa8" xml:space="preserve">}</text></svg>
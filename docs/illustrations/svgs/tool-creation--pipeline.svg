<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 544" width="680" height="544" font-family="'Geist Mono',ui-monospace,monospace" role="img" aria-label="A tool call is wrapped by wrapToolHandler, passes loggingInterceptor and tracingInterceptor before, then errorInterceptor wraps YourTool.execute (input validation, service calls, return shaped result; catch becomes an MCP error), then tracing and logging close after, producing the MCP response."><rect x="0.5" y="0.5" width="679" height="543" rx="14" fill="#0c0c12" stroke="#23232f"></rect><text x="28" y="32" font-size="11" fill="#6a6a78" letter-spacing="0.08em" xml:space="preserve">TOOL PIPELINE</text><text x="340" y="58" font-size="11.5" fill="#c7c7d1" text-anchor="middle" xml:space="preserve">MCP request: { tool: "create_model", args: {…} }</text><line x1="340" y1="76" x2="340" y2="100" stroke="#4a4a5e" stroke-width="1.5"></line><path d="M335 94 L340 102 L345 94 Z" fill="#7c5cff"></path><rect x="70" y="100" width="540" height="40" rx="9" fill="#101019" stroke="#2a2a38"></rect><text x="90" y="125" font-size="12" fill="#a78bfa" xml:space="preserve">wrapToolHandler(handler, [interceptors])</text><rect x="70" y="166" width="540" height="38" rx="9" fill="#14141e" stroke="#2a2a38"></rect><text x="90" y="190" font-size="12" fill="#e7e7ee" xml:space="preserve">loggingInterceptor</text><text x="270" y="190" font-size="11" fill="#6a6a78" xml:space="preserve">(start, args)</text><text x="620" y="189" font-size="10.5" fill="#8aa6ff" xml:space="preserve">before</text><line x1="340" y1="204" x2="340" y2="224" stroke="#4a4a5e" stroke-width="1.5"></line><path d="M335 218 L340 226 L345 218 Z" fill="#7c5cff"></path><rect x="70" y="230" width="540" height="38" rx="9" fill="#14141e" stroke="#2a2a38"></rect><text x="90" y="254" font-size="12" fill="#e7e7ee" xml:space="preserve">tracingInterceptor</text><text x="270" y="254" font-size="11" fill="#6a6a78" xml:space="preserve">(span open)</text><text x="620" y="253" font-size="10.5" fill="#8aa6ff" xml:space="preserve">before</text><line x1="340" y1="268" x2="340" y2="288" stroke="#4a4a5e" stroke-width="1.5"></line><path d="M335 282 L340 290 L345 282 Z" fill="#7c5cff"></path><rect x="70" y="294" width="540" height="118" rx="9" fill="#ff8a9b" fill-opacity="0.04" stroke="#ff8a9b" stroke-opacity="0.5"></rect><text x="90" y="318" font-size="12" fill="#ff8a9b" xml:space="preserve">errorInterceptor</text><text x="270" y="318" font-size="11" fill="#6a6a78" xml:space="preserve">try { … } catch</text><text x="620" y="318" font-size="10.5" fill="#ff8a9b" xml:space="preserve">around</text><rect x="94" y="332" width="492" height="52" rx="8" fill="#14141e" stroke="#4a4a5e"></rect><text x="112" y="352" font-size="11.5" fill="#7ee2c1" xml:space="preserve">YourTool.execute(args, context)</text><text x="580" y="352" font-size="10" fill="#6a6a78" text-anchor="end" xml:space="preserve">← your code</text><text x="112" y="372" font-size="10" fill="#9a9aa8" xml:space="preserve">input validation · service calls (DataLayer) · return shaped result</text><text x="90" y="402" font-size="10.5" fill="#ff8a9b" xml:space="preserve">catch → MCP-shaped error response</text><line x1="340" y1="412" x2="340" y2="432" stroke="#4a4a5e" stroke-width="1.5"></line><path d="M335 426 L340 434 L345 426 Z" fill="#7c5cff"></path><rect x="70" y="438" width="540" height="56" rx="9" fill="#14141e" stroke="#2a2a38"></rect><text x="90" y="462" font-size="12" fill="#e7e7ee" xml:space="preserve">tracingInterceptor</text><text x="270" y="462" font-size="11" fill="#6a6a78" xml:space="preserve">(span close)</text><text x="90" y="482" font-size="12" fill="#e7e7ee" xml:space="preserve">loggingInterceptor</text><text x="270" y="482" font-size="11" fill="#6a6a78" xml:space="preserve">(duration, status)</text><text x="620" y="470" font-size="10.5" fill="#7ee2c1" xml:space="preserve">after</text><line x1="340" y1="494" x2="340" y2="514" stroke="#4a4a5e" stroke-width="1.5"></line><path d="M335 508 L340 516 L345 508 Z" fill="#7c5cff"></path><text x="340" y="524" font-size="12" fill="#e7e7ee" text-anchor="middle" xml:space="preserve">MCP response</text></svg>
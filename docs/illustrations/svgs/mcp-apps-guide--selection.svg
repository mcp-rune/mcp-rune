<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 652" width="860" height="652" font-family="'Geist Mono',ui-monospace,monospace" role="img" aria-label="Three layers: the MCP app captures a selection and calls an app-only select tool; the MCP server holds it in a session-scoped SelectionStore exposing app-only and model-visible tools; the LLM reads the selection back for bulk operations."><rect x="0.5" y="0.5" width="859" height="651" rx="14" fill="#0c0c12" stroke="#23232f"></rect><text x="28" y="32" font-size="11" fill="#6a6a78" letter-spacing="0.08em" xml:space="preserve">SELECTION STORE · ARCHITECTURE</text><rect x="24" y="56" width="812" height="140" rx="12" fill="#101019" stroke="#2a2a38"></rect><circle cx="44" cy="82" r="4" fill="#7ee2c1"></circle><text x="56" y="86" font-size="12" fill="#7ee2c1" letter-spacing="0.12em" xml:space="preserve">MCP APP (iframe)</text><text x="48" y="100" font-size="12" fill="#c7c7d1" xml:space="preserve">User checks rows →</text><rect x="190" y="88" width="108" height="20" rx="5" fill="#7ee2c1" fill-opacity="0.1" stroke="#7ee2c1" stroke-opacity="0.3"></rect><text x="202" y="102" font-size="11" fill="#7ee2c1" xml:space="preserve">✓ Activity 1</text><rect x="306" y="88" width="108" height="20" rx="5" fill="#7ee2c1" fill-opacity="0.1" stroke="#7ee2c1" stroke-opacity="0.3"></rect><text x="318" y="102" font-size="11" fill="#7ee2c1" xml:space="preserve">✓ Activity 3</text><text x="48" y="128" font-size="12" fill="#c7c7d1" xml:space="preserve">Click "Send (Replace)" / "Send (Add)" →</text><rect x="48" y="142" width="788" height="40" rx="8" fill="#0c0c12" stroke="#2a2a38"></rect><text x="64" y="160" font-size="11" fill="#a78bfa" xml:space="preserve">callServerTool('select_find_records', {</text><text x="64" y="176" font-size="11" fill="#9a9aa8" xml:space="preserve">  model:'activity', mode:'ids', ids:['1','3'], total:2, strategy:'replace' })</text><line x1="440" y1="196" x2="440" y2="250" stroke="#4a4a5e" stroke-width="1.5"></line><path d="M436 202 L440 196 L444 202 Z" fill="#7c5cff"></path><path d="M436 244 L440 250 L444 244 Z" fill="#7c5cff"></path><rect x="390.8" y="212" width="98.4" height="22" rx="11" fill="#0c0c12" stroke="#383848"></rect><text x="440" y="227" font-size="10.5" fill="#a78bfa" text-anchor="middle" xml:space="preserve">MCP protocol</text><rect x="24" y="250" width="812" height="222" rx="12" fill="#101019" stroke="#2a2a38"></rect><circle cx="44" cy="276" r="4" fill="#7c5cff"></circle><text x="56" y="280" font-size="12" fill="#c9b8ff" letter-spacing="0.12em" xml:space="preserve">MCP SERVER</text><text x="48" y="292" font-size="12" fill="#e7e7ee" xml:space="preserve">SelectionStore</text><text x="170" y="292" font-size="10.5" fill="#6a6a78" xml:space="preserve">session-scoped Map</text><text x="64" y="314" font-size="11" fill="#c7c7d1" xml:space="preserve">activity → { mode:'ids', ids:['1','3'], total:2 }</text><text x="64" y="332" font-size="11" fill="#c7c7d1" xml:space="preserve">contact  → { mode:'filter', filters:{ city:'NY' } }</text><line x1="44" y1="348" x2="816" y2="348" stroke="#2a2a38" stroke-width="1" stroke-dasharray="2 4"></line><text x="48" y="370" font-size="11.5" fill="#f0c674" xml:space="preserve">Per-app tools</text><text x="160" y="370" font-size="10.5" fill="#6a6a78" xml:space="preserve">visibility: ['app']</text><text x="64" y="388" font-size="10.5" fill="#9a9aa8" xml:space="preserve">select_find_records · select_view_records · select_autocomplete_records · select_multi_records</text><text x="48" y="414" font-size="11.5" fill="#7ee2c1" xml:space="preserve">Shared tools</text><text x="160" y="414" font-size="10.5" fill="#6a6a78" xml:space="preserve">visibility: ['model']</text><text x="64" y="432" font-size="10.5" fill="#9a9aa8" xml:space="preserve">get_selection · add_to_selection · remove_from_selection</text><text x="64" y="450" font-size="10.5" fill="#9a9aa8" xml:space="preserve">clear_selection · materialize_selection</text><line x1="440" y1="472" x2="440" y2="526" stroke="#4a4a5e" stroke-width="1.5"></line><path d="M436 478 L440 472 L444 478 Z" fill="#7c5cff"></path><path d="M436 520 L440 526 L444 520 Z" fill="#7c5cff"></path><rect x="412.5" y="488" width="55" height="22" rx="11" fill="#0c0c12" stroke="#383848"></rect><text x="440" y="503" font-size="10.5" fill="#a78bfa" text-anchor="middle" xml:space="preserve">reads</text><rect x="24" y="526" width="812" height="104" rx="12" fill="#101019" stroke="#2a2a38"></rect><circle cx="44" cy="552" r="4" fill="#f0c674"></circle><text x="56" y="556" font-size="12" fill="#f0c674" letter-spacing="0.12em" xml:space="preserve">LLM</text><text x="48" y="572" font-size="11.5" fill="#c7c7d1" xml:space="preserve">Calls get_selection({ model:'activity' })  →  { ids:['1','3'], total:2 }</text><text x="48" y="596" font-size="11.5" fill="#9a9aa8" xml:space="preserve">Uses IDs for</text><text x="150" y="596" font-size="11.5" fill="#a78bfa" xml:space="preserve">bulk_action_models · update · export · …</text></svg>
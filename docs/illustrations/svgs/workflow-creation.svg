<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 478" width="820" height="478" font-family="'Geist Mono',ui-monospace,monospace" role="img" aria-label="suggest_workflow returns a roadmap plus step 1. The roadmap contains typed steps: Step 1 tool (call MCP tool, capture result), Step 2 analysis (LLM digests result, no tool call), Step 3 parallel (sub-step A and B), Step 4 decision (branch X or Y, user picks), Step 5 loop (repeat until exit condition). get_workflow_step advances one step at a time."><rect x="0.5" y="0.5" width="819" height="477" rx="14" fill="#0c0c12" stroke="#23232f"></rect><text x="28" y="32" font-size="11" fill="#6a6a78" letter-spacing="0.08em" xml:space="preserve">WORKFLOW · TYPED STEP SEQUENCE</text><rect x="230" y="46" width="360" height="32" rx="8" fill="#1c1c28" stroke="#2a2a38"></rect><text x="410" y="67" font-size="12" fill="#a78bfa" text-anchor="middle" xml:space="preserve">suggest_workflow(name)  →  roadmap + step 1</text><line x1="410" y1="78" x2="410" y2="102" stroke="#4a4a5e" stroke-width="1.5"></line><path d="M405 96 L410 104 L415 96 Z" fill="#7c5cff"></path><rect x="60" y="108" width="700" height="288" rx="12" fill="#101019" stroke="#2a2a38"></rect><text x="100" y="148" font-size="12.5" fill="#e7e7ee" xml:space="preserve">Step 1</text><rect x="168" y="134" width="50.4" height="20" rx="6" fill="#8aa6ff" fill-opacity="0.13" stroke="#8aa6ff" stroke-opacity="0.4"></rect><text x="178" y="148" font-size="11" fill="#8aa6ff" xml:space="preserve">tool</text><text x="238.4" y="148" font-size="11.5" fill="#9a9aa8" xml:space="preserve">→ call MCP tool, capture result</text><text x="100" y="190" font-size="12.5" fill="#e7e7ee" xml:space="preserve">Step 2</text><rect x="168" y="176" width="80.8" height="20" rx="6" fill="#7ee2c1" fill-opacity="0.13" stroke="#7ee2c1" stroke-opacity="0.4"></rect><text x="178" y="190" font-size="11" fill="#7ee2c1" xml:space="preserve">analysis</text><text x="268.8" y="190" font-size="11.5" fill="#9a9aa8" xml:sp
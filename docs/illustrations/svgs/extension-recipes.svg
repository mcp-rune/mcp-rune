<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 570" width="880" height="570" font-family="'Geist Mono',ui-monospace,monospace" role="img" aria-label="Eight intents routed to extension points: add a non-CRUD verb to a model uses customActionsExtension (ApiExtension); add an unrelated MCP tool uses ToolRegistry plus a BaseTool subclass; add an HTTP route uses HttpExtension; stage a write for human review uses ToolFlowExtension; add a summary lens uses a SummaryStrategy via ApiExtension; swap payload or association shape uses a BaseConvention override; stub the API for tests uses a DataLayer override; touch many surfaces uses the multi-surface recipe."><rect x="0.5" y="0.5" width="879" height="569" rx="14" fill="#0c0c12" stroke="#23232f"></rect><text x="28" y="32" font-size="11" fill="#6a6a78" letter-spacing="0.08em" xml:space="preserve">EXTENSION RECIPES · ROUTING INDEX</text><rect x="40" y="48" width="150" height="30" rx="8" fill="#1c1c28" stroke="#2a2a38"></rect><text x="64" y="68" font-size="12.5" fill="#e7e7ee" xml:space="preserve">I want to…</text><line x1="56" y1="78" x2="56" y2="520" stroke="#383848" stroke-width="1.4"></line><line x1="56" y1="114" x2="78" y2="114" stroke="#383848" stroke-width="1.4"></line><text x="90" y="112" font-size="12.5" fill="#e7e7ee" xml:space="preserve">Add a non-CRUD verb to a model</text><text x="90" y="129" font-size="10.5" fill="#6a6a78" xml:space="preserve">publish, archive, status changes</text><rect x="500" y="98" width="336" height="34" rx="8" fill="#14141e" stroke="#2a2a38"></rect><rect x="500" y="98" width="3" height="34" rx="1.5" fill="#a78bfa"></rect><text x="516" y="119" font-size="11.5" fill="#a78bfa" xml:space="preserve">→ customActionsExtension</text><rect x="733.2" y="106" width="92.80000000000001" height="18" rx="9" fill="#0c0c12" stroke="#383848"></rect><text x="779.6" y="119" font-size="9.5" fill="#6a6a78" text-anchor="middle" xml:space="preserve">ApiExtension</text><line x1="302" y1="112" x2="492" y2="11
848" stroke-width="1.4"></line><text x="90" y="286" font-size="12.5" fill="#e7e7ee" xml:space="preserve">Stage a write for human review</text><text x="90" y="303" font-size="10.5" fill="#6a6a78" xml:space="preserve">collect → review → submit</text><rect x="500" y="272" width="336" height="34" rx="8" fill="#14141e" stroke="#2a2a38"></rect><rect x="500" y="272" width="3" height="34" rx="1.5" fill="#f0c674"></rect><text x="516" y="293" font-size="11.5" fill="#f0c674" xml:space="preserve">→ ToolFlowExtension</text><rect x="714" y="280" width="112" height="18" rx="9" fill="#0c0c12" stroke="#383848"></rect><text x="770" y="293" font-size="9.5" fill="#6a6a78" text-anchor="middle" xml:space="preserve">centerOfControl</text><line x1="302" y1="286" x2="492" y2="286" stroke="#2a2a38" stroke-width="1" stroke-dasharray="2 4"></line><path d="M492 282 l8 4 -8 4 z" fill="#f0c674" fill-opacity="0.6"></path><line x1="56" y1="346" x2="78" y2="346" stroke="#383848" stroke-width="1.4"></line><text x="90" y="344" font-size="12.5" fill="#e7e7ee" xml:space="preserve">Add a new summary lens</text><rect x="500" y="330" width="336" height="34" rx="8" fill="#14141e" stroke="#2a2a38"></rect><rect x="500" y="330" width="3" height="34" rx="1.5" fill="#7ee2c1"></rect><text x="516" y="351" font-size="11.5" fill="#7ee2c1" xml:space="preserve">→ SummaryStrategy</text><rect x="733.2" y="338" width="92.80000000000001" height="18" rx="9" fill="#0c0c12" stroke="#383848"></rect><text x="779.6" y="351" font-size="9.5" fill="#6a6a78" text-anchor="middle" xml:space="preserve">ApiExtension</text><line x1="249.2" y1="344" x2="492" y2="344" stroke="#2a2a38" stroke-width="1" stroke-dasharray="2 4"></line><path d="M492 340 l8 4 -8 4 z" fill="#7ee2c1" fill-opacity="0.6"></path><line x1="56" y1="404" x2="78" y2="404" stroke="#383848" stroke-width="1.4"></line><text x="90" y="402" font-size="12.5" fill="#e7e7ee" xml:space="preserve">Swap payload / association shape</text><text x="90" y="419" font-size="10.5" fill="#
" fill="#ff8a9b"></rect><text x="516" y="525" font-size="11.5" fill="#ff8a9b" xml:space="preserve">→ Multi-surface recipe</text><rect x="752.4" y="512" width="73.6" height="18" rx="9" fill="#0c0c12" stroke="#383848"></rect><text x="789.2" y="525" font-size="9.5" fill="#6a6a78" text-anchor="middle" xml:space="preserve">composite</text><line x1="282.2" y1="518" x2="492" y2="518" stroke="#2a2a38" stroke-width="1" stroke-dasharray="2 4"></line><path d="M492 514 l8 4 -8 4 z" fill="#ff8a9b" fill-opacity="0.6"></path></svg>
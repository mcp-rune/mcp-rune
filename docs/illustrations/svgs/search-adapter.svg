<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" width="720" height="440" font-family="'Geist Mono',ui-monospace,monospace" role="img" aria-label="SearchService.search() enters buildRequest() (rarely overridden), which contains buildBody() (overridden in 95% of cases, shaping the POST body or filter envelope) and _buildQueryParams() (edge cases, adding expansion hints and sparse fieldsets as URL params)."><rect x="0.5" y="0.5" width="719" height="439" rx="14" fill="#0c0c12" stroke="#23232f"></rect><text x="28" y="32" font-size="11" fill="#6a6a78" letter-spacing="0.08em" xml:space="preserve">SEARCH ADAPTER · CONCENTRIC HOOKS</text><rect x="230" y="46" width="260" height="32" rx="8" fill="#1c1c28" stroke="#2a2a38"></rect><text x="360" y="67" font-size="12" fill="#a78bfa" text-anchor="middle" xml:space="preserve">SearchService.search()</text><line x1="360" y1="78" x2="360" y2="104" stroke="#4a4a5e" stroke-width="1.5"></line><path d="M355 98 L360 106 L365 98 Z" fill="#7c5cff"></path><rect x="60" y="110" width="600" height="300" rx="12" fill="rgba(124,92,255,0.03)" stroke="#2a2a38"></rect><text x="84" y="140" font-size="13" fill="#e7e7ee" xml:space="preserve">buildRequest()</text><rect x="556" y="124" width="80" height="22" rx="11" fill="#0c0c12" stroke="#383848"></rect><text x="596" y="139" font-size="10.5" fill="#6a6a78" text-anchor="middle" xml:space="preserve">rare</text><rect x="88" y="160" width="544" height="96" rx="10" fill="#14141e" stroke="#7c5cff" stroke-opacity="0.4"></rect><rect x="88" y="160" width="3" height="96" rx="1.5" fill="#7c5cff"></rect><text x="110" y="190" font-size="13" fill="#a78bfa" xml:space="preserve">buildBody()</text><rect x="500" y="174" width="112" height="22" rx="11" fill="#7c5cff" fill-opacity="0.12" stroke="#7c5cff" stroke-opacity="0.35"></rect><text x="556" y="189" font-size="10.5" fill="#a78bfa" text-anchor="middle" xml:space="preserve">95% of cases</text><text x="110" y="222" font-size="11.5" fill="#9a9aa8" xml:space="p
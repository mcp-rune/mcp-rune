<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 392" width="720" height="392" font-family="'Geist Mono',ui-monospace,monospace" role="img" aria-label="ModelService.findById('book', 42) calls EndpointResolver.resolveRecord, which checks api.endpoints.find, then api.endpoints.record (replacing :id), then whether the recordId is a compound path, then namespace plus endpoint giving /api/v1/books/42; first match wins and the result is apiClient.get('/api/v1/books/42')."><rect x="0.5" y="0.5" width="719" height="391" rx="14" fill="#0c0c12" stroke="#23232f"></rect><text x="28" y="32" font-size="11" fill="#6a6a78" letter-spacing="0.08em" xml:space="preserve">RESOLUTION CHAIN</text><rect x="210" y="52" width="300" height="34" rx="8" fill="#1c1c28" stroke="#2a2a38"></rect><text x="360" y="74" font-size="12" fill="#a78bfa" text-anchor="middle" xml:space="preserve">ModelService.findById('book', 42)</text><line x1="360" y1="86" x2="360" y2="112" stroke="#4a4a5e" stroke-width="1.5"></line><path d="M355 106 L360 114 L365 106 Z" fill="#7c5cff"></path><rect x="70" y="118" width="580" height="176" rx="10" fill="#14141e" stroke="#2a2a38"></rect><rect x="70" y="118" width="580" height="38" rx="10" fill="#1c1c28"></rect><rect x="70" y="146" width="580" height="10" fill="#1c1c28"></rect><text x="90" y="142" font-size="12" fill="#e7e7ee" xml:space="preserve">EndpointResolver.resolveRecord({ model, recordId: '42' })</text><text x="92" y="182" font-size="11.5" fill="#a78bfa" xml:space="preserve">1.</text><text x="112" y="182" font-size="11.5" fill="#c7c7d1" xml:space="preserve">api.endpoints.find?</text><text x="320" y="182" font-size="11" fill="#6a6a78" xml:space="preserve">─▶</text><text x="356" y="182" font-size="11.5" fill="#9a9aa8" xml:space="preserve">use it</text><text x="92" y="206" font-size="11.5" fill="#a78bfa" xml:space="preserve">2.</text><text x="112" y="206" font-size="11.5" fill="#c7c7d1" xml:space="preserve">api.endpoints.record?</text><text x="320" y="206" font-size="11" fill="#6a6a78" xml:space="preserve">─▶</text><text x="356" y="206" font-size="11.5" fill="#9a9aa8" xml:space="preserve">replace ':id' with '42'</text><text x="92" y="230" font-size="11.5" fill="#a78bfa" xml:space="preserve">3.</text><text x="112" y="230" font-size="11.5" fill="#c7c7d1" xml:space="preserve">recordId contains '/'?</text><text x="320" y="230" font-size="11" fill="#6a6a78" xml:space="preserve">─▶</text><text x="356" y="230" font-size="11.5" fill="#9a9aa8" xml:space="preserve">use compound id as path</text><text x="92" y="254" font-size="11.5" fill="#a78bfa" xml:space="preserve">4.</text><text x="112" y="254" font-size="11.5" fill="#c7c7d1" xml:space="preserve">namespace + endpoint</text><text x="320" y="254" font-size="11" fill="#6a6a78" xml:space="preserve">─▶</text><text x="356" y="254" font-size="11.5" fill="#7ee2c1" xml:space="preserve">/api/v1/books/42</text><line x1="86" y1="270" x2="634" y2="270" stroke="#2a2a38" stroke-width="1" stroke-dasharray="2 4"></line><text x="92" y="290" font-size="10.5" fill="#6a6a78" xml:space="preserve">First match wins · explicit overrides bypass namespace</text><line x1="360" y1="294" x2="360" y2="330" stroke="#4a4a5e" stroke-width="1.5"></line><path d="M355 324 L360 332 L365 324 Z" fill="#7ee2c1"></path><rect x="210" y="336" width="300" height="34" rx="8" fill="#7ee2c1" fill-opacity="0.06" stroke="#2f6e57"></rect><text x="360" y="358" font-size="12" fill="#7ee2c1" text-anchor="middle" xml:space="preserve">apiClient.get('/api/v1/books/42')</text></svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 384" width="900" height="384" font-family="'Geist Mono',ui-monospace,monospace" role="img" aria-label="distribution strategy dataflow: INPUT to ALGORITHM to OUTPUT."><rect x="0.5" y="0.5" width="899" height="383" rx="14" fill="#0c0c12" stroke="#23232f"></rect><text x="28" y="32" font-size="11" fill="#6a6a78" letter-spacing="0.08em" xml:space="preserve">DISTRIBUTION · STRATEGY DATAFLOW</text><text x="872" y="32" font-size="11" fill="#6a6a78" text-anchor="end" xml:space="preserve">scans all records</text><rect x="28" y="52" width="248" height="304" rx="10" fill="#14141e" stroke="#2a2a38"></rect><path d="M28 62a10 10 0 0 1 10-10h228a10 10 0 0 1 10 10v28H28z" fill="#1c1c28"></path><line x1="28" y1="90" x2="276" y2="90" stroke="#2a2a38"></line><circle cx="46" cy="76" r="4" fill="#6a6a78"></circle><text x="60" y="80" font-size="11.5" letter-spacing="0.14em" fill="#9a9aa8">INPUT</text><text x="48" y="118" font-size="12" fill="#e7e7ee" xml:space="preserve">First record's</text><text x="48" y="136.5" font-size="12" fill="#e7e7ee" xml:space="preserve">fields, then</text><text x="48" y="155" font-size="12" fill="#e7e7ee" xml:space="preserve">scan all records:</text><text x="48" y="184.5" font-size="11.5" fill="#c7c7d1" xml:space="preserve">status (enum)</text><text x="48" y="203" font-size="11.5" fill="#c7c7d1" xml:space="preserve">rating (numeric)</text><text x="48" y="221.5" font-size="11.5" fill="#c7c7d1" xml:space="preserve">created_at (date)</text><text x="48" y="240" font-size="11.5" fill="#c7c7d1" xml:space="preserve">title (other)</text><g transform="translate(288,204)"><line x1="0" y1="0" x2="30" y2="0" stroke="#4f3da6" stroke-width="2"></line><path d="M28 -6 L41 0 L28 6 Z" fill="#7c5cff"></path></g><rect x="332" y="52" width="248" height="304" rx="10" fill="#14141e" stroke="#2a2a38"></rect><path d="M332 62a10 10 0 0 1 10-10h228a10 10 0 0 1 10 10v28H332z" fill="#1c1c28"></path><line x1="332" y1="90" x2="580" y2="90" stroke="#2a2a38"></line><circle cx="350" cy="76" r="4" fill="#7c5cff"></circle><text x="364" y="80" font-size="11.5" letter-spacing="0.14em" fill="#a78bfa">ALGORITHM</text><text x="352" y="118" font-size="12" fill="#e7e7ee" xml:space="preserve">Classify field:</text><text x="352" y="136.5" font-size="11.5" fill="#c7c7d1" xml:space="preserve">  ≤ 20 distinct →</text><text x="352" y="155" font-size="11.5" fill="#a78bfa" xml:space="preserve">     enum-like</text><text x="352" y="173.5" font-size="11.5" fill="#c7c7d1" xml:space="preserve">  numeric →</text><text x="352" y="192" font-size="11.5" fill="#a78bfa" xml:space="preserve">     min/max/avg/median</text><text x="352" y="210.5" font-size="11.5" fill="#c7c7d1" xml:space="preserve">  ISO date → range</text><text x="352" y="229" font-size="11" fill="#9a9aa8" xml:space="preserve">  else → skip</text><g transform="translate(592,204)"><line x1="0" y1="0" x2="30" y2="0" stroke="#2f6e57" stroke-width="2"></line><path d="M28 -6 L41 0 L28 6 Z" fill="#7ee2c1"></path></g><rect x="624" y="52" width="248" height="304" rx="10" fill="#14141e" stroke="#2a2a38"></rect><path d="M624 62a10 10 0 0 1 10-10h228a10 10 0 0 1 10 10v28H624z" fill="#1c1c28"></path><line x1="624" y1="90" x2="872" y2="90" stroke="#2a2a38"></line><circle cx="642" cy="76" r="4" fill="#7ee2c1"></circle><text x="656" y="80" font-size="11.5" letter-spacing="0.14em" fill="#7ee2c1">OUTPUT</text><text x="644" y="118" font-size="12" fill="#a78bfa" xml:space="preserve">fields[name]</text><text x="644" y="136.5" font-size="11.5" fill="#c7c7d1" xml:space="preserve">  enum   : top 5</text><text x="644" y="155" font-size="11.5" fill="#c7c7d1" xml:space="preserve">  numeric: min/max</text><text x="644" y="173.5" font-size="11.5" fill="#c7c7d1" xml:space="preserve">    avg/median</text><text x="644" y="192" font-size="11.5" fill="#c7c7d1" xml:space="preserve">  date   : earliest</text><text x="644" y="210.5" font-size="11.5" fill="#c7c7d1" xml:space="preserve">    / latest</text><text x="644" y="229" font-size="11" fill="#9a9aa8" xml:space="preserve">  other  : skipped</text></svg>
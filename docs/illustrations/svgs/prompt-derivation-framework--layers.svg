<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 454" width="820" height="454" font-family="'Geist Mono',ui-monospace,monospace" role="img" aria-label="Five derivation layers shown bottom-up: Layer 1 Schema (derivePromptSchema) produces field definitions from model config; Layer 2 Grouping arranges sections and fieldGroups; Layer 3 Section Docs builds per-section tables; Layer 4 Assembly composes via PromptContentBuilder.build(); Layer 5 Behavioral wraps it with stateful guidance instructions."><rect x="0.5" y="0.5" width="819" height="453" rx="14" fill="#0c0c12" stroke="#23232f"></rect><text x="28" y="32" font-size="11" fill="#6a6a78" letter-spacing="0.08em" xml:space="preserve">PROMPT DERIVATION · FIVE LAYERS</text><rect x="84" y="56" width="652" height="68" rx="9" fill="#14141e" stroke="#2a2a38"></rect><rect x="84" y="56" width="3" height="68" rx="1.5" fill="#a78bfa"></rect><circle cx="110" cy="90" r="13" fill="#a78bfa" fill-opacity="0.14" stroke="#a78bfa" stroke-opacity="0.4"></circle><text x="110" y="94" font-size="13" fill="#a78bfa" text-anchor="middle" xml:space="preserve">5</text><text x="136" y="83" font-size="12.5" fill="#a78bfa" letter-spacing="0.04em" xml:space="preserve">Layer 5: BEHAVIORAL</text><text x="294.3" y="83" font-size="11.5" fill="#e7e7ee" xml:space="preserve">— generateStatefulGuidanceInstructions()</text><text x="136" y="104" font-size="11" fill="#9a9aa8" xml:space="preserve">(BasePrompt) Turn-taking, validation, mode selection</text><rect x="84" y="134" width="652" height="68" rx="9" fill="#14141e" stroke="#2a2a38"></rect><rect x="84" y="134" width="3" height="68" rx="1.5" fill="#8aa6ff"></rect><circle cx="110" cy="168" r="13" fill="#8aa6ff" fill-opacity="0.14" stroke="#8aa6ff" stroke-opacity="0.4"></circle><text x="110" y="172" font-size="13" fill="#8aa6ff" text-anchor="middle" xml:space="preserve">4</text><text x="136" y="161" font-size="12.5" fill="#8aa6ff" letter-spacing="0.04em" xml:space="preserve">Layer 4: ASSEMBLY</text><text x="278.9" y="161" font-size="11.5" fill="#e7e7ee" xml:space="preserve">— PromptContentBuilder.build()</text><text x="136" y="182" font-size="11" fill="#9a9aa8" xml:space="preserve">Composes all layers into final promptContent</text><rect x="84" y="212" width="652" height="68" rx="9" fill="#14141e" stroke="#2a2a38"></rect><rect x="84" y="212" width="3" height="68" rx="1.5" fill="#7ee2c1"></rect><circle cx="110" cy="246" r="13" fill="#7ee2c1" fill-opacity="0.14" stroke="#7ee2c1" stroke-opacity="0.4"></circle><text x="110" y="250" font-size="13" fill="#7ee2c1" text-anchor="middle" xml:space="preserve">3</text><text x="136" y="239" font-size="12.5" fill="#7ee2c1" letter-spacing="0.04em" xml:space="preserve">Layer 3: SECTION DOCS</text><text x="309.70000000000005" y="239" font-size="11.5" fill="#e7e7ee" xml:space="preserve">— PromptContentBuilder + BasePrompt</text><text x="136" y="260" font-size="11" fill="#9a9aa8" xml:space="preserve">Per-section field tables, enum tables, content notes</text><rect x="84" y="290" width="652" height="68" rx="9" fill="#14141e" stroke="#2a2a38"></rect><rect x="84" y="290" width="3" height="68" rx="1.5" fill="#f0c674"></rect><circle cx="110" cy="324" r="13" fill="#f0c674" fill-opacity="0.14" stroke="#f0c674" stroke-opacity="0.4"></circle><text x="110" y="328" font-size="13" fill="#f0c674" text-anchor="middle" xml:space="preserve">2</text><text x="136" y="317" font-size="12.5" fill="#f0c674" letter-spacing="0.04em" xml:space="preserve">Layer 2: GROUPING</text><text x="278.9" y="317" font-size="11.5" fill="#e7e7ee" xml:space="preserve">— sections + fieldGroups</text><text x="136" y="338" font-size="11" fill="#9a9aa8" xml:space="preserve">(BasePrompt static config) Workflow structure, field org</text><rect x="84" y="368" width="652" height="68" rx="9" fill="#14141e" stroke="#2a2a38"></rect><rect x="84" y="368" width="3" height="68" rx="1.5" fill="#ff8a9b"></rect><circle cx="110" cy="402" r="13" fill="#ff8a9b" fill-opacity="0.14" stroke="#ff8a9b" stroke-opacity="0.4"></circle><text x="110" y="406" font-size="13" fill="#ff8a9b" text-anchor="middle" xml:space="preserve">1</text><text x="136" y="395" font-size="12.5" fill="#ff8a9b" letter-spacing="0.04em" xml:space="preserve">Layer 1: SCHEMA</text><text x="263.5" y="395" font-size="11.5" fill="#e7e7ee" xml:space="preserve">— derivePromptSchema()</text><text x="136" y="416" font-size="11" fill="#9a9aa8" xml:space="preserve">(schema-derivation.js) fieldDefinitions from model config</text><line x1="46" y1="424" x2="46" y2="68" stroke="#4a4a5e" stroke-width="1.5"></line><path d="M42 76 L46 68 L50 76 Z" fill="#7ee2c1"></path><text x="30" y="246" font-size="10.5" fill="#6a6a78" text-anchor="middle" transform="rotate(-90 30 246)">data flows bottom-up ↑</text></svg>
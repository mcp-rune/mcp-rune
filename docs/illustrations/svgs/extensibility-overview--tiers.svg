<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 385" width="760" height="385" font-family="'Geist Mono',ui-monospace,monospace" role="img" aria-label="Three composable tiers, bottom-up. Tier 1 Core Adapters (DataLayer, ApiClient, BaseConvention, SearchAdapter, Kinds) handles the data path. Tier 2 Tool &amp; App Extensions (ApiExtension, ToolFlowExtension, AppDefinition, BasePrompt, custom BaseTool) extends the MCP surface. Tier 3 HTTP &amp; Transport (HttpExtension, OAuthService) adds routes and discovery. Tier 1 powers Tier 2; Tier 2 powers Tier 3."><rect x="0.5" y="0.5" width="759" height="384" rx="14" fill="#0c0c12" stroke="#23232f"></rect><text x="28" y="32" font-size="11" fill="#6a6a78" letter-spacing="0.08em" xml:space="preserve">EXTENSIBILITY · THREE TIERS</text><rect x="70" y="58" width="620" height="77" rx="10" fill="#14141e" stroke="#2a2a38"></rect><rect x="70" y="58" width="3" height="77" rx="1.5" fill="#8aa6ff"></rect><circle cx="96" cy="85" r="13" fill="#8aa6ff" fill-opacity="0.14" stroke="#8aa6ff" stroke-opacity="0.4"></circle><text x="96" y="89" font-size="13" fill="#8aa6ff" text-anchor="middle" xml:space="preserve">3</text><text x="122" y="89" font-size="13" fill="#8aa6ff" xml:space="preserve">Tier 3 — HTTP &amp; Transport</text><text x="122" y="110" font-size="11.5" fill="#c7c7d1" xml:space="preserve">HttpExtension · OAuthService</text><text x="122" y="131" font-size="10.5" fill="#6a6a78" xml:space="preserve">express routes, middleware, RFC discovery</text><rect x="70" y="147" width="620" height="96" rx="10" fill="#14141e" stroke="#2a2a38"></rect><rect x="70" y="147" width="3" height="96" rx="1.5" fill="#a78bfa"></rect><circle cx="96" cy="174" r="13" fill="#a78bfa" fill-opacity="0.14" stroke="#a78bfa" stroke-opacity="0.4"></circle><text x="96" y="178" font-size="13" fill="#a78bfa" text-anchor="middle" xml:space="preserve">2</text><text x="122" y="178" font-size="13" fill="#a78bfa" xml:space="preserve">Tier 2 — Tool &amp; App Extensions</text><text x="122" y="199" font-size="11.5" fill="#c7c7d1" xml:space="preserve">ApiExtension · ToolFlowExtension · AppDefinition</text><text x="122" y="218" font-size="11.5" fill="#c7c7d1" xml:space="preserve">BasePrompt · custom BaseTool</text><text x="122" y="239" font-size="10.5" fill="#6a6a78" xml:space="preserve">extend the MCP surface itself: tools, apps, prompts</text><rect x="70" y="255" width="620" height="96" rx="10" fill="#14141e" stroke="#2a2a38"></rect><rect x="70" y="255" width="3" height="96" rx="1.5" fill="#7ee2c1"></rect><circle cx="96" cy="282" r="13" fill="#7ee2c1" fill-opacity="0.14" stroke="#7ee2c1" stroke-opacity="0.4"></circle><text x="96" y="286" font-size="13" fill="#7ee2c1" text-anchor="middle" xml:space="preserve">1</text><text x="122" y="286" font-size="13" fill="#7ee2c1" xml:space="preserve">Tier 1 — Core Adapters</text><text x="122" y="307" font-size="11.5" fill="#c7c7d1" xml:space="preserve">DataLayer · ApiClient · BaseConvention · SearchAdapter</text><text x="122" y="326" font-size="11.5" fill="#c7c7d1" xml:space="preserve">Kinds (KindDescriptor / FormatterDescriptor)</text><text x="122" y="347" font-size="10.5" fill="#6a6a78" xml:space="preserve">data path: HTTP → normalize → CRUD → projection</text><line x1="46" y1="339" x2="46" y2="70" stroke="#4a4a5e" stroke-width="1.5"></line><path d="M42 78 L46 70 L50 78 Z" fill="#7ee2c1"></path><text x="30" y="204.5" font-size="10.5" fill="#6a6a78" text-anchor="middle" transform="rotate(-90 30 204.5)">composition · bottom-up ↑</text><text x="380" y="369" font-size="11" fill="#9a9aa8" text-anchor="middle" xml:space="preserve">Tier 1 powers Tier 2 · Tier 2 powers Tier 3</text></svg>
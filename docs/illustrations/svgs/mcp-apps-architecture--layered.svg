<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 752" width="880" height="752" font-family="'Geist Mono',ui-monospace,monospace" role="img" aria-label="MCP Apps high-level architecture, three layers. Top: the MCP Client (Claude Desktop or COC) hosts a sandboxed iframe running the single-file MCP App bundle, which receives inbound notifications (ontoolinput, ontoolresult, onhostcontextchanged) and makes outbound callServerTool calls (validate_form, create_model, find_model_app). Middle, connected by the MCP protocol: the MCP Server, with an AppRegistry that registers tools and resources, seven App Definitions pairing a tool with a ui:// resource, and pure-function Schema Generators (form, list, detail). Bottom, connected by HTTP with a Bearer token: the Rails API providing association options, record CRUD and search endpoints."><rect x="0.5" y="0.5" width="879" height="751" rx="14" fill="#0c0c12" stroke="#23232f"></rect><text x="28" y="32" font-size="11" fill="#6a6a78" letter-spacing="0.08em" xml:space="preserve">MCP APPS · HIGH-LEVEL ARCHITECTURE</text><rect x="24" y="56" width="832" height="240" rx="12" fill="#101019" stroke="#2a2a38"></rect><circle cx="44" cy="82" r="4" fill="#8aa6ff"></circle><text x="56" y="86" font-size="12" fill="#aebfff" letter-spacing="0.12em" xml:space="preserve">MCP CLIENT</text><text x="160" y="86" font-size="11" fill="#6a6a78" xml:space="preserve">Claude Desktop / COC</text><rect x="44" y="100" width="792" height="180" rx="10" fill="#14141e" stroke="#2a2a38"></rect><text x="64" y="128" font-size="12" fill="#a78bfa" xml:space="preserve">Sandboxed iframe</text><text x="190" y="128" font-size="11" fill="#6a6a78" xml:space="preserve">single-file HTML / JS / CSS bundle</text><line x1="64" y1="140" x2="816" y2="140" stroke="#2a2a38" stroke-width="1" stroke-dasharray="2 4"></line><text x="64" y="166" font-size="10.5" fill="#9a9aa8" letter-spacing="0.06em" xml:space="preserve">INBOUND · client → app</text><path d="M76 184 l8 -4 v8 z" fill="#8aa6ff"></path><line x1="76" y1="184" x2="92" y2="184" stroke="#8aa6ff" stroke-width="1.4"></line><text x="100" y="188" font-size="11.5" fill="#e7e7ee" xml:space="preserve">ontoolinput <tspan fill="#6a6a78">· LLM arguments</tspan></text><path d="M76 210 l8 -4 v8 z" fill="#8aa6ff"></path><line x1="76" y1="210" x2="92" y2="210" stroke="#8aa6ff" stroke-width="1.4"></line><text x="100" y="214" font-size="11.5" fill="#e7e7ee" xml:space="preserve">ontoolresult <tspan fill="#6a6a78">· schema + records</tspan></text><path d="M76 236 l8 -4 v8 z" fill="#8aa6ff"></path><line x1="76" y1="236" x2="92" y2="236" stroke="#8aa6ff" stroke-width="1.4"></line><text x="100" y="240" font-size="11.5" fill="#e7e7ee" xml:space="preserve">onhostcontextchanged <tspan fill="#6a6a78">· theme, fonts</tspan></text><line x1="452" y1="156" x2="452" y2="262" stroke="#2a2a38" stroke-width="1" stroke-dasharray="2 4"></line><text x="472" y="166" font-size="10.5" fill="#9a9aa8" letter-spacing="0.06em" xml:space="preserve">OUTBOUND · app → server</text><line x1="472" y1="184" x2="486" y2="184" stroke="#7c5cff" stroke-width="1.4"></line><path d="M486 180 l8 4 -8 4 z" fill="#7c5cff"></path><text x="502" y="188" font-size="11.5" fill="#e7e7ee" xml:space="preserve">callServerTool(<tspan fill="#7ee2c1">'validate_form'</tspan>)</text><line x1="472" y1="210" x2="486" y2="210" stroke="#7c5cff" stroke-width="1.4"></line><path d="M486 206 l8 4 -8 4 z" fill="#7c5cff"></path><text x="502" y="214" font-size="11.5" fill="#e7e7ee" xml:space="preserve">callServerTool(<tspan fill="#7ee2c1">'create_model'</tspan>)</text><line x1="472" y1="236" x2="486" y2="236" stroke="#7c5cff" stroke-width="1.4"></line><path d="M486 232 l8 4 -8 4 z" fill="#7c5cff"></path><text x="502" y="240" font-size="11.5" fill="#e7e7ee" xml:space="preserve">callServerTool(<tspan fill="#7ee2c1">'find_model_app'</tspan>)</text><line x1="440" y1="296" x2="440" y2="350" stroke="#4a4a5e" stroke-width="1.5"></line><path d="M436 300 L440 294 L444 300 Z" fill="#7c5cff"></path><path d="M436 346 L440 352 L444 346 Z" fill="#7c5cff"></path><rect x="384" y="312" width="112" height="22" rx="11" fill="#0c0c12" stroke="#383848"></rect><text x="440" y="327" font-size="10.5" fill="#a78bfa" text-anchor="middle" xml:space="preserve">MCP protocol</text><rect x="24" y="352" width="832" height="300" rx="12" fill="#101019" stroke="#2a2a38"></rect><circle cx="44" cy="378" r="4" fill="#7c5cff"></circle><text x="56" y="382" font-size="12" fill="#c9b8ff" letter-spacing="0.12em" xml:space="preserve">MCP SERVER</text><rect x="44" y="396" width="792" height="50" rx="9" fill="#14141e" stroke="#2a2a38"></rect><text x="64" y="417" font-size="12" fill="#a78bfa" xml:space="preserve">AppRegistry</text><text x="64" y="435" font-size="11" fill="#9a9aa8" xml:space="preserve">registerTools(mcpServer, { getAccessToken })<tspan fill="#4a4a5e">  ·  </tspan>registerResources(mcpServer)</text><rect x="44" y="458" width="486" height="178" rx="9" fill="#14141e" stroke="#2a2a38"></rect><text x="64" y="482" font-size="12" fill="#e7e7ee" xml:space="preserve">App Definitions <tspan fill="#6a6a78">· tool → ui:// resource</tspan></text><text x="64" y="506" font-size="11" fill="#c7c7d1" xml:space="preserve">new_model_app</text><text x="232" y="506" font-size="11" fill="#7ee2c1" xml:space="preserve">→ ui://…/new-model-app</text><text x="64" y="527" font-size="11" fill="#c7c7d1" xml:space="preserve">edit_model_app</text><text x="232" y="527" font-size="11" fill="#7ee2c1" xml:space="preserve">→ ui://…/edit-model-app</text><text x="64" y="548" font-size="11" fill="#c7c7d1" xml:space="preserve">find_model_app</text><text x="232" y="548" font-size="11" fill="#7ee2c1" xml:space="preserve">→ ui://…/find-model-app</text><text x="64" y="569" font-size="11" fill="#c7c7d1" xml:space="preserve">show_model_app</text><text x="232" y="569" font-size="11" fill="#7ee2c1" xml:space="preserve">→ ui://…/show-model-app</text><text x="64" y="590" font-size="11" fill="#c7c7d1" xml:space="preserve">pick_model_app</text><text x="232" y="590" font-size="11" fill="#7ee2c1" xml:space="preserve">→ ui://…/pick-model-app</text><text x="64" y="611" font-size="11" fill="#c7c7d1" xml:space="preserve">multi_pick_model_app</text><text x="232" y="611" font-size="11" fill="#7ee2c1" xml:space="preserve">→ ui://…/multi-pick-model-app</text><text x="64" y="632" font-size="11" fill="#c7c7d1" xml:space="preserve">view_selection_app</text><text x="232" y="632" font-size="11" fill="#7ee2c1" xml:space="preserve">→ ui://…/view-selection-app</text><rect x="546" y="458" width="290" height="178" rx="9" fill="#14141e" stroke="#2a2a38"></rect><text x="566" y="482" font-size="12" fill="#e7e7ee" xml:space="preserve">Schema Generators</text><text x="566" y="500" font-size="10.5" fill="#6a6a78" xml:space="preserve">pure functions · no API calls</text><text x="566" y="528" font-size="11" fill="#a78bfa" xml:space="preserve">generateFormSchema<tspan fill="#6a6a78">(Model, Prompt)</tspan></text><text x="566" y="556" font-size="11" fill="#a78bfa" xml:space="preserve">generateListSchema<tspan fill="#6a6a78">(Model)</tspan></text><text x="566" y="584" font-size="11" fill="#a78bfa" xml:space="preserve">generateDetailSchema<tspan fill="#6a6a78">(Model, Prompt?)</tspan></text><line x1="566" y1="602" x2="816" y2="602" stroke="#2a2a38" stroke-width="1" stroke-dasharray="2 4"></line><text x="566" y="622" font-size="10.5" fill="#6a6a78" xml:space="preserve">deterministic · cache-friendly</text><line x1="440" y1="652" x2="440" y2="706" stroke="#4a4a5e" stroke-width="1.5"></line><path d="M436 656 L440 650 L444 656 Z" fill="#f0c674"></path><path d="M436 702 L440 708 L444 702 Z" fill="#f0c674"></path><rect x="368" y="668" width="144" height="22" rx="11" fill="#0c0c12" stroke="#383848"></rect><text x="440" y="683" font-size="10.5" fill="#f0c674" text-anchor="middle" xml:space="preserve">HTTP · Bearer token</text><rect x="24" y="708" width="832" height="44" rx="10" fill="#14141e" stroke="#2a2a38"></rect><circle cx="44" cy="730" r="4" fill="#7ee2c1"></circle><text x="56" y="734" font-size="12" fill="#7ee2c1" letter-spacing="0.12em" xml:space="preserve">RAILS API</text><text x="170" y="734" font-size="11" fill="#9a9aa8" xml:space="preserve">association options · record CRUD · search endpoints</text></svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 308" width="880" height="308" font-family="'Geist Mono',ui-monospace,monospace" role="img" aria-label="A layout declared on a prompt fieldGroup flows through buildGroupLayouts() in form-schema.js into groupLayouts on the schema, is read by renderFieldGroup() in the client app.js which wraps fields in a field-row div, and is finally styled by the .field-row CSS as an equal-width flex row."><rect x="0.5" y="0.5" width="879" height="307" rx="14" fill="#0c0c12" stroke="#23232f"></rect><text x="28" y="32" font-size="11" fill="#6a6a78" letter-spacing="0.08em" xml:space="preserve">LAYOUT FLOW · PROMPT → SCHEMA → CLIENT → CSS</text><rect x="24" y="56" width="180" height="224" rx="10" fill="#14141e" stroke="#2a2a38"></rect><rect x="24" y="56" width="180" height="30" rx="10" fill="#1c1c28"></rect><rect x="24" y="76" width="180" height="10" fill="#1c1c28"></rect><circle cx="40" cy="71" r="3.5" fill="#a78bfa"></circle><text x="52" y="75" font-size="11" fill="#a78bfa" xml:space="preserve">Prompt fieldGroups</text><text x="38" y="110" font-size="10.5" fill="#c7c7d1" xml:space="preserve">fieldGroups: {</text><text x="38" y="128" font-size="10.5" fill="#c7c7d1" xml:space="preserve">  classification: {</text><text x="38" y="146" font-size="10.5" fill="#c7c7d1" xml:space="preserve">    layout: {</text><text x="38" y="164" font-size="10.5" fill="#a78bfa" xml:space="preserve">      type: 'row'</text><text x="38" y="182" font-size="10.5" fill="#c7c7d1" xml:space="preserve">    }</text><text x="38" y="200" font-size="10.5" fill="#c7c7d1" xml:space="preserve">  }</text><text x="38" y="218" font-size="10.5" fill="#c7c7d1" xml:space="preserve">}</text><line x1="208" y1="168" x2="228" y2="168" stroke="#4a4a5e" stroke-width="1.5"></line><path d="M222 163 L230 168 L222 173 Z" fill="#7c5cff"></path><rect x="232" y="56" width="180" height="224" rx="10" fill="#14141e" stroke="#2a2a38"></rect><rect x="232" y="56" width="180" height="30" rx="10" fill="#1c1c28"></rect><rect x="232" y="76" width="180" height="10" fill="#1c1c28"></rect><circle cx="248" cy="71" r="3.5" fill="#8aa6ff"></circle><text x="260" y="75" font-size="11" fill="#8aa6ff" xml:space="preserve">form-schema.js</text><text x="246" y="110" font-size="10.5" fill="#a78bfa" xml:space="preserve">buildGroupLayouts()</text><text x="246" y="146" font-size="10.5" fill="#9a9aa8" xml:space="preserve">extracts layout</text><text x="246" y="164" font-size="10.5" fill="#9a9aa8" xml:space="preserve">from each group</text><text x="246" y="182" font-size="10.5" fill="#9a9aa8" xml:space="preserve">into groupLayouts</text><text x="246" y="200" font-size="10.5" fill="#9a9aa8" xml:space="preserve">on schema output</text><line x1="416" y1="168" x2="436" y2="168" stroke="#4a4a5e" stroke-width="1.5"></line><path d="M430 163 L438 168 L430 173 Z" fill="#7c5cff"></path><rect x="440" y="56" width="180" height="224" rx="10" fill="#14141e" stroke="#2a2a38"></rect><rect x="440" y="56" width="180" height="30" rx="10" fill="#1c1c28"></rect><rect x="440" y="76" width="180" height="10" fill="#1c1c28"></rect><circle cx="456" cy="71" r="3.5" fill="#7ee2c1"></circle><text x="468" y="75" font-size="11" fill="#7ee2c1" xml:space="preserve">Client app.js</text><text x="454" y="110" font-size="10.5" fill="#a78bfa" xml:space="preserve">renderFieldGroup()</text><text x="454" y="146" font-size="10.5" fill="#9a9aa8" xml:space="preserve">checks layout.type</text><text x="454" y="164" font-size="10.5" fill="#9a9aa8" xml:space="preserve">wraps fields in</text><text x="454" y="182" font-size="10.5" fill="#7ee2c1" xml:space="preserve">&lt;div class=</text><text x="454" y="200" font-size="10.5" fill="#7ee2c1" xml:space="preserve"> "field-row"&gt;</text><line x1="624" y1="168" x2="644" y2="168" stroke="#4a4a5e" stroke-width="1.5"></line><path d="M638 163 L646 168 L638 173 Z" fill="#7c5cff"></path><rect x="648" y="56" width="180" height="224" rx="10" fill="#14141e" stroke="#2a2a38"></rect><rect x="648" y="56" width="180" height="30" rx="10" fill="#1c1c28"></rect><rect x="648" y="76" width="180" height="10" fill="#1c1c28"></rect><circle cx="664" cy="71" r="3.5" fill="#f0c674"></circle><text x="676" y="75" font-size="11" fill="#f0c674" xml:space="preserve">CSS</text><text x="662" y="110" font-size="10.5" fill="#a78bfa" xml:space="preserve">.field-row</text><text x="662" y="146" font-size="10.5" fill="#9a9aa8" xml:space="preserve">flex row</text><text x="662" y="164" font-size="10.5" fill="#9a9aa8" xml:space="preserve">equal-width</text><text x="662" y="182" font-size="10.5" fill="#9a9aa8" xml:space="preserve">children</text></svg>
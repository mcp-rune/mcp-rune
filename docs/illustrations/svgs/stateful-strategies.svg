<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" width="720" height="520" font-family="'Geist Mono',ui-monospace,monospace" role="img" aria-label="Stateful prompt section progression: get_prompt_guide advances through Section 1 basics, Section 2 classification, and Section 3 timing. Each section is validated — errors loop back, ok advances. getProgress() reports completed [basics, classification] and pending [timing] at any time. Finally generateSummary applies a create_model or update_model mutation."><rect x="0.5" y="0.5" width="719" height="519" rx="14" fill="#0c0c12" stroke="#23232f"></rect><text x="28" y="32" font-size="11" fill="#6a6a78" letter-spacing="0.08em" xml:space="preserve">STATEFUL PROMPT · SECTION PROGRESSION</text><rect x="40" y="48" width="184" height="32" rx="8" fill="#1c1c28" stroke="#2a2a38"></rect><text x="58" y="68" font-size="12" fill="#a78bfa" xml:space="preserve">get_prompt_guide</text><path d="M132 80 V108" fill="none" stroke="#7c5cff" stroke-width="1.75"></path><path d="M126 104 L132 116 L138 104 Z" fill="#7c5cff"></path><rect x="40" y="110" width="300" height="86" rx="10" fill="#14141e" stroke="#2a2a38"></rect><text x="58" y="136" font-size="12.5" fill="#e7e7ee" xml:space="preserve">Section 1</text><rect x="138" y="124" width="60" height="20" rx="10" fill="#7c5cff" fill-opacity="0.12" stroke="#7c5cff" stroke-opacity="0.3"></rect><text x="150" y="138" font-size="11" fill="#a78bfa" xml:space="preserve">basics</text><line x1="58" y1="150" x2="322" y2="150" stroke="#2a2a38" stroke-width="1" stroke-dasharray="2 4"></line><text x="58" y="170" font-size="11.5" fill="#9a9aa8" xml:space="preserve">title</text><text x="58" y="188" font-size="11.5" fill="#9a9aa8" xml:space="preserve">description</text><text x="360" y="130" font-size="11" fill="#9a9aa8" xml:space="preserve">validateSection('basics')</text><text x="360" y="154" font-size="11" fill="#7ee2c1" xml:space="preserve">ok → advance</text><text x="360" y="174" font-size="11" fill
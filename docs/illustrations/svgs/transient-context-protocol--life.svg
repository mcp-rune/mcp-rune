<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 458" width="760" height="458" font-family="'Geist Mono',ui-monospace,monospace" role="img" aria-label="Lifecycle: get_workflow_step sets _meta.contextHints registering transient/consumer pairs; search_records returns a result marked _meta.context.lifecycle transient with a summary; the LLM analyzes the data; store_analysis_memory sets _meta.context.consumed true; the client then collapses the search_records result and replaces it with the summary."><rect x="0.5" y="0.5" width="759" height="457" rx="14" fill="#0c0c12" stroke="#23232f"></rect><text x="28" y="32" font-size="11" fill="#6a6a78" letter-spacing="0.08em" xml:space="preserve">TRANSIENT CONTEXT · LIFECYCLE</text><rect x="80" y="58" width="600" height="62" rx="10" fill="#14141e" stroke="#2a2a38"></rect><rect x="80" y="58" width="3" height="62" rx="1.5" fill="#a78bfa"></rect><text x="100" y="84" font-size="12.5" fill="#e7e7ee" xml:space="preserve">get_workflow_step</text><text x="100" y="104" font-size="11" fill="#a78bfa" xml:space="preserve">_meta.contextHints</text><text x="660" y="104" font-size="10.5" fill="#6a6a78" text-anchor="end" xml:space="preserve">registers transient / consumer pairs</text><line x1="380" y1="120" x2="380" y2="144" stroke="#4a4a5e" stroke-width="1.5"></line><path d="M375 138 L380 146 L385 138 Z" fill="#7c5cff"></path><rect x="80" y="144" width="600" height="62" rx="10" fill="#14141e" stroke="#2a2a38"></rect><rect x="80" y="144" width="3" height="62" rx="1.5" fill="#8aa6ff"></rect><text x="100" y="170" font-size="12.5" fill="#e7e7ee" xml:space="preserve">search_records</text><text x="100" y="190" font-size="11" fill="#8aa6ff" xml:space="preserve">_meta.context.lifecycle: 'transient'</text><text x="660" y="190" font-size="10.5" fill="#6a6a78" text-anchor="end" xml:space="preserve">+ summary attached</text><line x1="380" y1="206" x2="380" y2="230" stroke="#4a4a5e" stroke-width="1.5"></line><path d="M375 224 L380 232 L385 224 Z" fill="#7c5cff"></path><rect x="80" y="230" width="600" height="48" rx="10" fill="#14141e" stroke="#2a2a38"></rect><rect x="80" y="230" width="3" height="48" rx="1.5" fill="#9a9aa8"></rect><text x="100" y="260" font-size="12.5" fill="#c7c7d1" xml:space="preserve">LLM analyzes the data</text><text x="660" y="260" font-size="10.5" fill="#6a6a78" text-anchor="end" xml:space="preserve">reads the transient payload</text><line x1="380" y1="278" x2="380" y2="302" stroke="#4a4a5e" stroke-width="1.5"></line><path d="M375 296 L380 304 L385 296 Z" fill="#7c5cff"></path><rect x="80" y="302" width="600" height="62" rx="10" fill="#14141e" stroke="#2a2a38"></rect><rect x="80" y="302" width="3" height="62" rx="1.5" fill="#7ee2c1"></rect><text x="100" y="328" font-size="12.5" fill="#e7e7ee" xml:space="preserve">store_analysis_memory</text><text x="100" y="348" font-size="11" fill="#7ee2c1" xml:space="preserve">_meta.context.consumed: true</text><text x="660" y="348" font-size="10.5" fill="#6a6a78" text-anchor="end" xml:space="preserve">the consumer fires</text><line x1="380" y1="364" x2="380" y2="388" stroke="#4a4a5e" stroke-width="1.5"></line><path d="M375 382 L380 390 L385 382 Z" fill="#7c5cff"></path><rect x="80" y="388" width="600" height="48" rx="10" fill="#14141e" stroke="#2a2a38"></rect><rect x="80" y="388" width="3" height="48" rx="1.5" fill="#f0c674"></rect><text x="100" y="418" font-size="12.5" fill="#c7c7d1" xml:space="preserve">Client collapses search_records result</text><text x="660" y="418" font-size="10.5" fill="#6a6a78" text-anchor="end" xml:space="preserve">→ replaced with summary</text></svg>
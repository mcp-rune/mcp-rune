<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 690" width="860" height="690" font-family="'Geist Mono',ui-monospace,monospace" role="img" aria-label="OAuth2 discovery sequence between Client, MCP Server, and Auth Server. The client posts to /mcp without a token and gets a 401 with a WWW-Authenticate header (RFC 9728). It discovers protected-resource and authorization-server metadata, performs dynamic client registration (RFC 7591), authorizes with PKCE (RFC 6749/8707), exchanges the code for access and refresh tokens, then reconnects to /mcp with a Bearer token; the server introspects it and serves MCP tools. The MCP server proxies registration, authorize, token and introspection to the upstream auth server."><rect x="0.5" y="0.5" width="859" height="689" rx="14" fill="#0c0c12" stroke="#23232f"></rect><text x="28" y="32" font-size="11" fill="#6a6a78" letter-spacing="0.08em" xml:space="preserve">OAUTH2 DISCOVERY · PROXIED FLOW</text><line x1="150" y1="104" x2="150" y2="676" stroke="#2a2a38" stroke-width="1" stroke-dasharray="2 5"></line><line x1="460" y1="104" x2="460" y2="676" stroke="#2a2a38" stroke-width="1" stroke-dasharray="2 5"></line><line x1="760" y1="104" x2="760" y2="676" stroke="#2a2a38" stroke-width="1" stroke-dasharray="2 5"></line><rect x="104" y="74" width="92" height="28" rx="8" fill="#1c1c28" stroke="#383848"></rect><text x="150" y="92" font-size="12" fill="#e7e7ee" text-anchor="middle" xml:space="preserve">Client</text><rect x="404" y="74" width="112" height="28" rx="8" fill="#7c5cff" fill-opacity="0.14" stroke="#7c5cff" stroke-opacity="0.45"></rect><text x="460" y="92" font-size="12" fill="#a78bfa" text-anchor="middle" xml:space="preserve">MCP Server</text><rect x="708" y="74" width="104" height="28" rx="8" fill="#1c1c28" stroke="#383848"></rect><text x="760" y="92" font-size="12" fill="#e7e7ee" text-anchor="middle" xml:space="preserve">Auth Server</text><line x1="28" y1="128" x2="832" y2="128" stroke="#23232f" stroke-width="1" stroke-dasharray="1 5"></line><rect x="392" y="119" width="136" height="18" rx="9" fill="#0c0c12"></rect><text x="460" y="132" font-size="10" fill="#6a6a78" text-anchor="middle" letter-spacing="0.06em" xml:space="preserve">DISCOVERY · 401</text><text x="305" y="150" font-size="11" fill="#c7c7d1" text-anchor="middle" xml:space="preserve">POST /mcp  (no token)</text><line x1="158" y1="158" x2="452" y2="158" stroke="#7c5cff" stroke-width="1.6"></line><path d="M448 154 L460 158 L448 162 Z" fill="#7c5cff"></path><text x="305" y="182" font-size="11" fill="#9a9aa8" text-anchor="middle" xml:space="preserve">401 · WWW-Authenticate: Bearer <tspan fill="#6a6a78">· RFC 9728</tspan></text><line x1="452" y1="190" x2="158" y2="190" stroke="#6a6a78" stroke-width="1.4" stroke-dasharray="5 4"></line><path d="M162 186 L150 190 L162 194 Z" fill="#6a6a78"></path><line x1="28" y1="214" x2="832" y2="214" stroke="#23232f" stroke-width="1" stroke-dasharray="1 5"></line><rect x="376" y="205" width="168" height="18" rx="9" fill="#0c0c12"></rect><text x="460" y="218" font-size="10" fill="#6a6a78" text-anchor="middle" letter-spacing="0.06em" xml:space="preserve">METADATA DISCOVERY</text><text x="305" y="236" font-size="11" fill="#c7c7d1" text-anchor="middle" xml:space="preserve">GET protected-resource metadata <tspan fill="#6a6a78">· 9728</tspan></text><line x1="158" y1="244" x2="452" y2="244" stroke="#7c5cff" stroke-width="1.6"></line><path d="M448 240 L460 244 L448 248 Z" fill="#7c5cff"></path><text x="305" y="268" font-size="11" fill="#9a9aa8" text-anchor="middle" xml:space="preserve">{ resource, authorization_servers }</text><line x1="452" y1="276" x2="158" y2="276" stroke="#6a6a78" stroke-width="1.4" stroke-dasharray="5 4"></line><path d="M162 272 L150 276 L162 280 Z" fill="#6a6a78"></path><text x="305" y="300" font-size="11" fill="#c7c7d1" text-anchor="middle" xml:space="preserve">GET authorization-server metadata <tspan fill="#6a6a78">· 8414</tspan></text><line x1="158" y1="308" x2="452" y2="308" stroke="#7c5cff" stroke-width="1.6"></line><path d="M448 304 L460 308 L448 312 Z" fill="#7c5cff"></path><text x="610" y="300" font-size="10.5" fill="#6a6a78" text-anchor="middle" xml:space="preserve">fetch + rewrite upstream</text><line x1="470" y1="308" x2="750" y2="308" stroke="#4a4a5e" stroke-width="1.3"></line><path d="M746 304 L758 308 L746 312 Z" fill="#5a5a68"></path><path d="M474 304 L462 308 L474 312 Z" fill="#5a5a68"></path><line x1="28" y1="332" x2="832" y2="332" stroke="#23232f" stroke-width="1" stroke-dasharray="1 5"></line><rect x="362" y="323" width="196" height="18" rx="9" fill="#0c0c12"></rect><text x="460" y="336" font-size="10" fill="#6a6a78" text-anchor="middle" letter-spacing="0.06em" xml:space="preserve">DYNAMIC CLIENT REGISTRATION</text><text x="305" y="354" font-size="11" fill="#c7c7d1" text-anchor="middle" xml:space="preserve">POST /oauth/register <tspan fill="#6a6a78">· RFC 7591</tspan></text><line x1="158" y1="362" x2="452" y2="362" stroke="#7c5cff" stroke-width="1.6"></line><path d="M448 358 L460 362 L448 366 Z" fill="#7c5cff"></path><text x="610" y="354" font-size="10.5" fill="#6a6a78" text-anchor="middle" xml:space="preserve">proxied</text><line x1="470" y1="362" x2="750" y2="362" stroke="#4a4a5e" stroke-width="1.3"></line><path d="M746 358 L758 362 L746 366 Z" fill="#5a5a68"></path><path d="M474 358 L462 362 L474 366 Z" fill="#5a5a68"></path><text x="305" y="386" font-size="11" fill="#9a9aa8" text-anchor="middle" xml:space="preserve">{ client_id, client_secret }</text><line x1="452" y1="394" x2="158" y2="394" stroke="#6a6a78" stroke-width="1.4" stroke-dasharray="5 4"></line><path d="M162 390 L150 394 L162 398 Z" fill="#6a6a78"></path><line x1="28" y1="418" x2="832" y2="418" stroke="#23232f" stroke-width="1" stroke-dasharray="1 5"></line><rect x="372" y="409" width="176" height="18" rx="9" fill="#0c0c12"></rect><text x="460" y="422" font-size="10" fill="#6a6a78" text-anchor="middle" letter-spacing="0.06em" xml:space="preserve">AUTHORIZATION · PKCE</text><text x="305" y="440" font-size="11" fill="#c7c7d1" text-anchor="middle" xml:space="preserve">GET /oauth/authorize <tspan fill="#6a6a78">· 6749 + PKCE + 8707</tspan></text><line x1="158" y1="448" x2="452" y2="448" stroke="#7c5cff" stroke-width="1.6"></line><path d="M448 444 L460 448 L448 452 Z" fill="#7c5cff"></path><text x="610" y="440" font-size="10.5" fill="#6a6a78" text-anchor="middle" xml:space="preserve">302 redirect</text><line x1="470" y1="448" x2="750" y2="448" stroke="#4a4a5e" stroke-width="1.3"></line><path d="M746 444 L758 448 L746 452 Z" fill="#5a5a68"></path><rect x="176" y="466" width="568" height="26" rx="7" fill="#101019" stroke="#23232f"></rect><text x="460" y="483" font-size="10.5" fill="#9a9aa8" text-anchor="middle" xml:space="preserve">user authenticates on auth server → redirect to /oauth/callback with auth code</text><line x1="28" y1="512" x2="832" y2="512" stroke="#23232f" stroke-width="1" stroke-dasharray="1 5"></line><rect x="386" y="503" width="148" height="18" rx="9" fill="#0c0c12"></rect><text x="460" y="516" font-size="10" fill="#6a6a78" text-anchor="middle" letter-spacing="0.06em" xml:space="preserve">TOKEN EXCHANGE</text><text x="305" y="534" font-size="11" fill="#c7c7d1" text-anchor="middle" xml:space="preserve">POST /oauth/token <tspan fill="#6a6a78">· PKCE + resource</tspan></text><line x1="158" y1="542" x2="452" y2="542" stroke="#7c5cff" stroke-width="1.6"></line><path d="M448 538 L460 542 L448 546 Z" fill="#7c5cff"></path><text x="610" y="534" font-size="10.5" fill="#6a6a78" text-anchor="middle" xml:space="preserve">proxied</text><line x1="470" y1="542" x2="750" y2="542" stroke="#4a4a5e" stroke-width="1.3"></line><path d="M746 538 L758 542 L746 546 Z" fill="#5a5a68"></path><path d="M474 538 L462 542 L474 546 Z" fill="#5a5a68"></path><text x="305" y="566" font-size="11" fill="#9a9aa8" text-anchor="middle" xml:space="preserve">{ access_token, refresh_token }</text><line x1="452" y1="574" x2="158" y2="574" stroke="#6a6a78" stroke-width="1.4" stroke-dasharray="5 4"></line><path d="M162 570 L150 574 L162 578 Z" fill="#6a6a78"></path><line x1="28" y1="598" x2="832" y2="598" stroke="#23232f" stroke-width="1" stroke-dasharray="1 5"></line><rect x="368" y="589" width="184" height="18" rx="9" fill="#0c0c12"></rect><text x="460" y="602" font-size="10" fill="#6a6a78" text-anchor="middle" letter-spacing="0.06em" xml:space="preserve">AUTHENTICATED SESSION</text><text x="305" y="620" font-size="11" fill="#c7c7d1" text-anchor="middle" xml:space="preserve">POST /mcp + Authorization: Bearer</text><line x1="158" y1="628" x2="452" y2="628" stroke="#7c5cff" stroke-width="1.6"></line><path d="M448 624 L460 628 L448 632 Z" fill="#7c5cff"></path><text x="610" y="620" font-size="10.5" fill="#6a6a78" text-anchor="middle" xml:space="preserve">introspect (cached)</text><line x1="470" y1="628" x2="750" y2="628" stroke="#4a4a5e" stroke-width="1.3"></line><path d="M746 624 L758 628 L746 632 Z" fill="#5a5a68"></path><path d="M474 624 L462 628 L474 632 Z" fill="#5a5a68"></path><text x="305" y="652" font-size="11" fill="#7ee2c1" text-anchor="middle" xml:space="preserve">Session created · MCP tools served</text><line x1="452" y1="660" x2="158" y2="660" stroke="#2f6e57" stroke-width="1.5" stroke-dasharray="5 4"></line><path d="M162 656 L150 660 L162 664 Z" fill="#7ee2c1"></path></svg>
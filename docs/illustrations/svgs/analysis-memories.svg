<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 754" width="880" height="754" font-family="'Geist Mono',ui-monospace,monospace" role="img" aria-label="Analysis-memories session lifecycle driven by the LLM across two tables (ingested_records JSONB and analysis_memories vector). ① BOOTSTRAP: analysis_ingest auto-paginates GET requests into ingested_records and embeds per-page summaries into analysis_memories. ② READ: analysis_query runs SQL over ingested_records, or semantic mode embeds the query and does cosine search over analysis_memories. ③ WRITE: analysis_store embeds findings into analysis_memories with no API call. Steps ② and ③ loop. ③.5 ACT: analysis_act selects IDs from ingested_records and batches PATCH/DELETE upstream. ④ TEARDOWN: analysis_clear deletes both tables. Embedding occurs only at ingest, store, and semantic query."><rect x="0.5" y="0.5" width="879" height="753" rx="14" fill="#0c0c12" stroke="#23232f"></rect><text x="28" y="34" font-size="11" fill="#6a6a78" letter-spacing="0.08em" xml:space="preserve">SESSION LIFECYCLE</text><text x="232" y="34" font-size="10.5" fill="#6a6a78" xml:space="preserve">the LLM is the loop driver</text><rect x="560" y="19" width="118.8" height="20" rx="6" fill="#f0c674" fill-opacity="0.12" stroke="#f0c674" stroke-opacity="0.4"></rect><text x="619.4" y="33" font-size="10" fill="#f0c674" text-anchor="middle" xml:space="preserve">ingested_records</text><text x="684.8" y="33" font-size="9" fill="#6a6a78" xml:space="preserve">JSONB</text><rect x="736.8" y="19" width="125.1" height="20" rx="6" fill="#7ee2c1" fill-opacity="0.12" stroke="#7ee2c1" stroke-opacity="0.4"></rect><text x="799.3499999999999" y="33" font-size="10" fill="#7ee2c1" text-anchor="middle" xml:space="preserve">analysis_memories</text><text x="867.9" y="33" font-size="9" fill="#6a6a78" xml:space="preserve">vector</text><rect x="28" y="52" width="824" height="128" rx="11" fill="#14141e" stroke="#2a2a38"></rect><rect x="28" y="52" width="3" height="128" rx="1.5" fill="#8aa6ff"></rect><circle cx="58" cy="78" r="14" fill="#8aa6ff" fill-opacity="0.14" stroke="#8aa6ff" stroke-opacity="0.45"></circle><text x="58" y="82" font-size="13" fill="#8aa6ff" text-anchor="middle" xml:space="preserve">①</text><text x="82" y="76" font-size="12.5" fill="#8aa6ff" letter-spacing="0.06em" xml:space="preserve">BOOTSTRAP</text><text x="168.39999999999998" y="76" font-size="10.5" fill="#6a6a78" xml:space="preserve">runs once per analysis_id</text><text x="82" y="97" font-size="12" fill="#e7e7ee" xml:space="preserve">analysis_ingest(model, filters)</text><text x="96" y="127" font-size="11" fill="#9a9aa8" xml:space="preserve">GET /api/&lt;model&gt;?page=N</text><line x1="248.6" y1="123" x2="266.6" y2="123" stroke="#4a4a5e" stroke-width="1.4"></line><path d="M266.6 119 l8 4 -8 4 z" fill="#4a4a5e"></path><text x="263.6" y="114" font-size="8.5" fill="#6a6a78" text-anchor="middle" xml:space="preserve">≤50 pages</text><rect x="278.6" y="113" width="118.8" height="20" rx="6" fill="#f0c674" fill-opacity="0.12" stroke="#f0c674" stroke-opacity="0.4"></rect><text x="338" y="127" font-size="10" fill="#f0c674" text-anchor="middle" xml:space="preserve">ingested_records</text><text x="407.40000000000003" y="127" font-size="9.5" fill="#6a6a78" xml:space="preserve">raw JSONB · 1h TTL</text><text x="96" y="157" font-size="11" fill="#9a9aa8" xml:space="preserve">per-page summary</text><line x1="205.2" y1="153" x2="223.2" y2="153" stroke="#a78bfa" stroke-width="1.4" stroke-dasharray="3 3"></line><path d="M223.2 149 l8 4 -8 4 z" fill="#a78bfa"></path><text x="220.2" y="144" font-size="8.5" fill="#6a6a78" text-anchor="middle" xml:space="preserve">EMBED</text><rect x="235.2" y="143" width="125.1" height="20" rx="6" fill="#7ee2c1" fill-opacity="0.12" stroke="#7ee2c1" stroke-opacity="0.4"></rect><text x="297.75" y="157" font-size="10" fill="#7ee2c1" text-anchor="middle" xml:space="preserve">analysis_memories</text><text x="370.29999999999995" y="157" font-size="9.5" fill="#6a6a78" xml:space="preserve">page_summary:&lt;strategy&gt;</text><rect x="28" y="202" width="824" height="124" rx="11" fill="#14141e" stroke="#2a2a38"></rect><rect x="28" y="202" width="3" height="124" rx="1.5" fill="#a78bfa"></rect><circle cx="58" cy="228" r="14" fill="#a78bfa" fill-opacity="0.14" stroke="#a78bfa" stroke-opacity="0.45"></circle><text x="58" y="232" font-size="13" fill="#a78bfa" text-anchor="middle" xml:space="preserve">②</text><text x="82" y="226" font-size="12.5" fill="#a78bfa" letter-spacing="0.06em" xml:space="preserve">READ</text><text x="130.4" y="226" font-size="10.5" fill="#6a6a78" xml:space="preserve">LLM queries to understand the data</text><text x="82" y="247" font-size="12" fill="#e7e7ee" xml:space="preserve">analysis_query(analysis_id, mode, …)</text><text x="96" y="277" font-size="11" fill="#9a9aa8" xml:space="preserve">describe / aggregate / filter / sample</text><line x1="341.6" y1="273" x2="359.6" y2="273" stroke="#4a4a5e" stroke-width="1.4"></line><path d="M359.6 269 l8 4 -8 4 z" fill="#4a4a5e"></path><text x="356.6" y="264" font-size="8.5" fill="#6a6a78" text-anchor="middle" xml:space="preserve">SQL</text><rect x="371.6" y="263" width="118.8" height="20" rx="6" fill="#f0c674" fill-opacity="0.12" stroke="#f0c674" stroke-opacity="0.4"></rect><text x="431" y="277" font-size="10" fill="#f0c674" text-anchor="middle" xml:space="preserve">ingested_records</text><text x="120" y="292" font-size="9.5" fill="#6a6a78" xml:space="preserve">GROUP BY · JSONB @&gt; · range casts · ROW_NUMBER() · date_bin() buckets</text><text x="96" y="315" font-size="11" fill="#c7c7d1" xml:space="preserve">semantic</text><line x1="155.6" y1="311" x2="173.6" y2="311" stroke="#a78bfa" stroke-width="1.4" stroke-dasharray="3 3"></line><path d="M173.6 307 l8 4 -8 4 z" fill="#a78bfa"></path><text x="170.6" y="302" font-size="8.5" fill="#6a6a78" text-anchor="middle" xml:space="preserve">EMBED(q)</text><text x="185.6" y="315" font-size="11" fill="#9a9aa8" xml:space="preserve">cosine</text><line x1="232.8" y1="311" x2="250.8" y2="311" stroke="#4a4a5e" stroke-width="1.4"></line><path d="M250.8 307 l8 4 -8 4 z" fill="#4a4a5e"></path><rect x="262.8" y="301" width="125.1" height="20" rx="6" fill="#7ee2c1" fill-opacity="0.12" stroke="#7ee2c1" stroke-opacity="0.4"></rect><text x="325.35" y="315" font-size="10" fill="#7ee2c1" text-anchor="middle" xml:space="preserve">analysis_memories</text><rect x="348" y="334" width="184" height="22" rx="11" fill="#0c0c12" stroke="#383848"></rect><text x="440" y="349" font-size="10.5" fill="#a78bfa" text-anchor="middle" xml:space="preserve">② ⇄ ③  repeat as a loop</text><rect x="28" y="364" width="824" height="100" rx="11" fill="#14141e" stroke="#2a2a38"></rect><rect x="28" y="364" width="3" height="100" rx="1.5" fill="#7ee2c1"></rect><circle cx="58" cy="390" r="14" fill="#7ee2c1" fill-opacity="0.14" stroke="#7ee2c1" stroke-opacity="0.45"></circle><text x="58" y="394" font-size="13" fill="#7ee2c1" text-anchor="middle" xml:space="preserve">③</text><text x="82" y="388" font-size="12.5" fill="#7ee2c1" letter-spacing="0.06em" xml:space="preserve">WRITE</text><text x="138" y="388" font-size="10.5" fill="#6a6a78" xml:space="preserve">commits insights from step ②</text><text x="82" y="409" font-size="12" fill="#e7e7ee" xml:space="preserve">analysis_store(findings[])  ·  no API call</text><text x="96" y="443" font-size="11" fill="#9a9aa8" xml:space="preserve">finding text</text><line x1="180.4" y1="439" x2="198.4" y2="439" stroke="#a78bfa" stroke-width="1.4" stroke-dasharray="3 3"></line><path d="M198.4 435 l8 4 -8 4 z" fill="#a78bfa"></path><text x="195.4" y="430" font-size="8.5" fill="#6a6a78" text-anchor="middle" xml:space="preserve">EMBED</text><rect x="210.4" y="429" width="125.1" height="20" rx="6" fill="#7ee2c1" fill-opacity="0.12" stroke="#7ee2c1" stroke-opacity="0.4"></rect><text x="272.95" y="443" font-size="10" fill="#7ee2c1" text-anchor="middle" xml:space="preserve">analysis_memories</text><text x="345.5" y="443" font-size="9.5" fill="#6a6a78" xml:space="preserve">category by LLM · 1h TTL or persistent</text><rect x="28" y="486" width="824" height="116" rx="11" fill="#14141e" stroke="#2a2a38"></rect><rect x="28" y="486" width="3" height="116" rx="1.5" fill="#f0c674"></rect><circle cx="58" cy="512" r="14" fill="#f0c674" fill-opacity="0.14" stroke="#f0c674" stroke-opacity="0.45"></circle><text x="58" y="516" font-size="13" fill="#f0c674" text-anchor="middle" xml:space="preserve">③·⁵</text><text x="82" y="510" font-size="12.5" fill="#f0c674" letter-spacing="0.06em" xml:space="preserve">ACT</text><text x="122.8" y="510" font-size="10.5" fill="#6a6a78" xml:space="preserve">optional · mutate a subset</text><text x="82" y="531" font-size="12" fill="#e7e7ee" xml:space="preserve">analysis_act(analysis_id, model, where?, action, …)</text><text x="96" y="561" font-size="11" fill="#9a9aa8" xml:space="preserve">SELECT ids FROM</text><rect x="199" y="547" width="118.8" height="20" rx="6" fill="#f0c674" fill-opacity="0.12" stroke="#f0c674" stroke-opacity="0.4"></rect><text x="258.4" y="561" font-size="10" fill="#f0c674" text-anchor="middle" xml:space="preserve">ingested_records</text><text x="327.8" y="561" font-size="11" fill="#9a9aa8" xml:space="preserve">WHERE &lt;predicate&gt;</text><line x1="443.20000000000005" y1="557" x2="461.20000000000005" y2="557" stroke="#4a4a5e" stroke-width="1.4"></line><path d="M461.20000000000005 553 l8 4 -8 4 z" fill="#4a4a5e"></path><text x="473.20000000000005" y="561" font-size="11" fill="#c7c7d1" xml:space="preserve">resolved IDs</text><text x="557.6" y="561" font-size="9.5" fill="#6a6a78" xml:space="preserve">(server-side only)</text><text x="96" y="589" font-size="11" fill="#9a9aa8" xml:space="preserve">batches of 50 · concurrency 5</text><line x1="285.8" y1="585" x2="303.8" y2="585" stroke="#4a4a5e" stroke-width="1.4"></line><path d="M303.8 581 l8 4 -8 4 z" fill="#4a4a5e"></path><text x="300.8" y="576" font-size="8.5" fill="
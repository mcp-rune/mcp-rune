<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 500" width="720" height="500" font-family="'Geist Mono',ui-monospace,monospace" role="img" aria-label="The projection layer (tools, prompts, apps, workflows) reads and writes only through the DataLayer interface (create, find, list, update, delete and normalized variants plus dispatch/buildPayload escape hatches); the default adapter ModelService composes ApiClient and Convention beneath the seam."><rect x="0.5" y="0.5" width="719" height="499" rx="14" fill="#0c0c12" stroke="#23232f"></rect><text x="28" y="32" font-size="11" fill="#6a6a78" letter-spacing="0.08em" xml:space="preserve">DATA LAYER · THE SEAM</text><rect x="60" y="56" width="600" height="80" rx="12" fill="#101019" stroke="#2a2a38"></rect><circle cx="80" cy="82" r="4" fill="#a78bfa"></circle><text x="92" y="86" font-size="12" fill="#a78bfa" letter-spacing="0.12em" xml:space="preserve">PROJECTION LAYER</text><text x="84" y="112" font-size="12.5" fill="#c7c7d1" xml:space="preserve">tools · prompts · apps · workflows</text><line x1="360" y1="136" x2="360" y2="196" stroke="#4a4a5e" stroke-width="1.5"></line><path d="M356 142 L360 136 L364 142 Z" fill="#7c5cff"></path><path d="M356 190 L360 196 L364 190 Z" fill="#7c5cff"></path><rect x="264.3" y="155" width="191.4" height="22" rx="11" fill="#0c0c12" stroke="#383848"></rect><text x="360" y="170" font-size="10.5" fill="#a78bfa" text-anchor="middle" xml:space="preserve">reads / writes through ONLY</text><rect x="60" y="196" width="600" height="116" rx="12" fill="#101019" stroke="#2a2a38"></rect><circle cx="80" cy="222" r="4" fill="#7c5cff"></circle><text x="92" y="226" font-size="12" fill="#c9b8ff" letter-spacing="0.12em" xml:space="preserve">DATALAYER</text><text x="210" y="226" font-size="11" fill="#6a6a78" xml:space="preserve">interface</text><text x="84" y="250" font-size="12.5" fill="#e7e7ee" xml:space="preserve">create · find · list · update · delete</text><text x="84" y="272" font-size="12" fill="#9a9aa8" xml:space="preserve">listNormalized · searchNormalized · …</text><text x="84" y="294" font-size="12" fill="#f0c674" xml:space="preserve">dispatch / buildPayload</text><text x="300" y="294" font-size="11" fill="#6a6a78" xml:space="preserve">escape hatches</text><line x1="360" y1="312" x2="360" y2="372" stroke="#4a4a5e" stroke-width="1.5"></line><path d="M356 318 L360 312 L364 318 Z" fill="#7c5cff"></path><path d="M356 366 L360 372 L364 366 Z" fill="#7c5cff"></path><rect x="348" y="331" width="24" height="22" rx="11" fill="#0c0c12" stroke="#383848"></rect><text x="360" y="346" font-size="10.5" fill="#a78bfa" text-anchor="middle" xml:space="preserve"></text><rect x="60" y="372" width="600" height="100" rx="12" fill="#101019" stroke="#2a2a38"></rect><circle cx="80" cy="398" r="4" fill="#7ee2c1"></circle><text x="92" y="402" font-size="12" fill="#7ee2c1" letter-spacing="0.12em" xml:space="preserve">DEFAULT ADAPTER · ModelService</text><rect x="84" y="418" width="552" height="1" rx="0" fill="#2a2a38"></rect><text x="84" y="440" font-size="12.5" fill="#e7e7ee" xml:space="preserve">├─ ApiClient</text><text x="210" y="440" font-size="11" fill="#6a6a78" xml:space="preserve">HTTP verbs against URLs</text><text x="84" y="460" font-size="12.5" fill="#e7e7ee" xml:space="preserve">└─ Convention</text><text x="210" y="460" font-size="11" fill="#6a6a78" xml:space="preserve">payload / association shape</text></svg>
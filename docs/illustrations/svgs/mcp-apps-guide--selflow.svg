<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 540" width="760" height="540" font-family="'Geist Mono',ui-monospace,monospace" role="img" aria-label="Selection flow: user selects in UI, app calls an app-only select tool, SelectionStore.set persists it, the app sends a status message, then the LLM reads it back via the shared selection tools for follow-up operations."><rect x="0.5" y="0.5" width="759" height="539" rx="14" fill="#0c0c12" stroke="#23232f"></rect><text x="28" y="32" font-size="11" fill="#6a6a78" letter-spacing="0.08em" xml:space="preserve">SELECTION FLOW</text><rect x="40" y="60" width="680" height="46" rx="9" fill="#14141e" stroke="#2a2a38"></rect><text x="380" y="88" font-size="12.5" fill="#e7e7ee" text-anchor="middle" xml:space="preserve">User selects records in UI</text><line x1="380" y1="106" x2="380" y2="136" stroke="#4a4a5e" stroke-width="1.5"></line><path d="M375 130 L380 138 L385 130 Z" fill="#7c5cff"></path><rect x="40" y="136" width="680" height="58" rx="9" fill="#14141e" stroke="#2a2a38"></rect><text x="60" y="162" font-size="12.5" fill="#e7e7ee" xml:space="preserve">App calls select_*_records tool</text><rect x="476" y="154" width="226" height="24" rx="7" fill="#f0c674" fill-opacity="0.08" stroke="#f0c674" stroke-opacity="0.3"></rect><text x="589" y="170" font-size="10" fill="#f0c674" text-anchor="middle" xml:space="preserve">['app'] only · not LLM-callable</text><line x1="380" y1="194" x2="380" y2="224" stroke="#4a4a5e" stroke-width="1.5"></line><path d="M375 218 L380 226 L385 218 Z" fill="#7c5cff"></path><rect x="40" y="224" width="680" height="46" rx="9" fill="#14141e" stroke="#2a2a38"></rect><text x="380" y="252" font-size="12" fill="#a78bfa" text-anchor="middle" xml:space="preserve">SelectionStore.set({ model, mode, ids, filters, total, strategy })</text><line x1="380" y1="270" x2="380" y2="300" stroke="#4a4a5e" stroke-width="1.5"></line><path d="M375 294 L380 302 L385 294 Z" fill="#7c5cff"></path><rect x="40" y="300" width="680" height="60" rx="9" fill="#14141e" stroke="#2a2a38"></rect><text x="60" y="326" font-size="12.5" fill="#e7e7ee" xml:space="preserve">App sends status message</text><text x="60" y="346" font-size="11" fill="#7ee2c1" xml:space="preserve">"Selection saved: 2 Activities" (replace)</text><text x="420" y="346" font-size="11" fill="#7ee2c1" xml:space="preserve">"Added 2 — total is now 5" (add)</text><line x1="380" y1="360" x2="380" y2="390" stroke="#4a4a5e" stroke-width="1.5"></line><path d="M375 384 L380 392 L385 384 Z" fill="#7c5cff"></path><rect x="40" y="390" width="680" height="58" rx="9" fill="#14141e" stroke="#2a2a38"></rect><text x="60" y="416" font-size="12.5" fill="#e7e7ee" xml:space="preserve">LLM calls the shared selection tools</text><text x="60" y="436" font-size="10" fill="#9a9aa8" xml:space="preserve">get_selection · add_to_selection · remove_from_selection · clear_selection · materialize_selection</text><line x1="380" y1="448" x2="380" y2="478" stroke="#4a4a5e" stroke-width="1.5"></line><path d="M375 472 L380 480 L385 472 Z" fill="#7c5cff"></path><rect x="40" y="478" width="680" height="46" rx="9" fill="#14141e" stroke="#2a2a38"></rect><rect x="40" y="478" width="3" height="46" rx="1.5" fill="#7ee2c1"></rect><text x="380" y="506" font-size="12" fill="#7ee2c1" text-anchor="middle" xml:space="preserve">Returns stored selection → LLM uses it for follow-up operations</text></svg>
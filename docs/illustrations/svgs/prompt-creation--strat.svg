<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 892 432" width="892" height="432" font-family="'Geist Mono',ui-monospace,monospace" role="img" aria-label="Three escalating prompt strategies. Stateless (&lt;10 fields) offers getDocumentation and validates at submit only — simple forms. Hybrid (10–20 fields) adds validateFields and generateSummary, validating the full form once before submit — medium forms. Stateful (20+ fields) further adds validateSection and getProgress, validating per section and tracking progress — complex forms."><rect x="0.5" y="0.5" width="891" height="431" rx="14" fill="#0c0c12" stroke="#23232f"></rect><text x="28" y="32" font-size="11" fill="#6a6a78" letter-spacing="0.08em" xml:space="preserve">PROMPT STRATEGIES · ESCALATION</text><rect x="28" y="52" width="252" height="340" rx="11" fill="#14141e" stroke="#2a2a38"></rect><rect x="28" y="52" width="252" height="40" rx="11" fill="#1c1c28"></rect><rect x="28" y="80" width="252" height="12" fill="#1c1c28"></rect><text x="154" y="77" font-size="13" fill="#c7c7d1" text-anchor="middle" letter-spacing="0.1em" xml:space="preserve">STATELESS</text><rect x="44" y="104" width="220" height="26" rx="7" fill="#0c0c12" stroke="#383848"></rect><text x="154" y="121" font-size="11.5" fill="#e7e7ee" text-anchor="middle" xml:space="preserve">&lt; 10 fields</text><text x="48" y="156" font-size="10" fill="#6a6a78" letter-spacing="0.12em" xml:space="preserve">OPS</text><circle cx="54" cy="175" r="2.5" fill="#6a6a78"></circle><text x="64" y="178" font-size="11.5" fill="#c7c7d1" xml:space="preserve">getDocumentation</text><line x1="44" y1="332" x2="264" y2="332" stroke="#2a2a38" stroke-width="1" stroke-dasharray="2 4"></line><text x="48" y="352" font-size="11" fill="#9a9aa8" xml:space="preserve">Validate at</text><text x="48" y="370" font-size="11" fill="#9a9aa8" xml:space="preserve">submit only</text><text x="154" y="410" font-size="11" fill="#6a6a78" text-anchor="middle" xml:space="preserve">Simple forms</text><line x1="286" y1="200" x2="314" y2="200" stroke="#4a4a5e" stroke-width="1.5"></line><path d="M308 195 L316 200 L308 205 Z" fill="#7c5cff"></path><rect x="320" y="52" width="252" height="340" rx="11" fill="#14141e" stroke="#2a2a38"></rect><rect x="320" y="52" width="252" height="40" rx="11" fill="#1c1c28"></rect><rect x="320" y="80" width="252" height="12" fill="#1c1c28"></rect><text x="446" y="77" font-size="13" fill="#a78bfa" text-anchor="middle" letter-spacing="0.1em" xml:space="preserve">HYBRID</text><rect x="336" y="104" width="220" height="26" rx="7" fill="#0c0c12" stroke="#383848"></rect><text x="446" y="121" font-size="11.5" fill="#e7e7ee" text-anchor="middle" xml:space="preserve">10 – 20 fields</text><text x="340" y="156" font-size="10" fill="#6a6a78" letter-spacing="0.12em" xml:space="preserve">OPS</text><circle cx="346" cy="175" r="2.5" fill="#6a6a78"></circle><text x="356" y="178" font-size="11.5" fill="#c7c7d1" xml:space="preserve">getDocumentation</text><rect x="336" y="190" width="220" height="22" rx="6" fill="#7c5cff" fill-opacity="0.12" stroke="#7c5cff" stroke-opacity="0.32"></rect><circle cx="346" cy="201" r="2.5" fill="#7c5cff"></circle><text x="356" y="204" font-size="11.5" fill="#a78bfa" xml:space="preserve">validateFields</text><rect x="336" y="216" width="220" height="22" rx="6" fill="#7c5cff" fill-opacity="0.12" stroke="#7c5cff" stroke-opacity="0.32"></rect><circle cx="346" cy="227" r="2.5" fill="#7c5cff"></circle><text x="356" y="230" font-size="11.5" fill="#a78bfa" xml:space="preserve">generateSummary</text><line x1="336" y1="332" x2="556" y2="332" stroke="#2a2a38" stroke-width="1" stroke-dasharray="2 4"></line><text x="340" y="352" font-size="11" fill="#9a9aa8" xml:space="preserve">Validate full</text><text x="340" y="370" font-size="11" fill="#9a9aa8" xml:space="preserve">form once before submit</text><text x="446" y="410" font-size="11" fill="#6a6a78" text-anchor="middle" xml:space="preserve">Medium forms</text><line x1="578" y1="200" x2="606" y2="200" stroke="#4a4a5e" stroke-width="1.5"></line><path d="M600 195 L608 200 L600 205 Z" fill="#7c5cff"></path><rect x="612" y="52" width="252" height="340" rx="11" fill="#14141e" stroke="#3a3450"></rect><rect x="612" y="52" width="252" height="40" rx="11" fill="#1c1c28"></rect><rect x="612" y="80" width="252" height="12" fill="#1c1c28"></rect><text x="738" y="77" font-size="13" fill="#7ee2c1" text-anchor="middle" letter-spacing="0.1em" xml:space="preserve">STATEFUL</text><rect x="628" y="104" width="220" height="26" rx="7" fill="#0c0c12" stroke="#383848"></rect><text x="738" y="121" font-size="11.5" fill="#e7e7ee" text-anchor="middle" xml:space="preserve">20+ fields</text><text x="632" y="156" font-size="10" fill="#6a6a78" letter-spacing="0.12em" xml:space="preserve">OPS</text><circle cx="638" cy="175" r="2.5" fill="#6a6a78"></circle><text x="648" y="178" font-size="11.5" fill="#c7c7d1" xml:space="preserve">getDocumentation</text><circle cx="638" cy="201" r="2.5" fill="#6a6a78"></circle><text x="648" y="204" font-size="11.5" fill="#c7c7d1" xml:space="preserve">validateFields</text><circle cx="638" cy="227" r="2.5" fill="#6a6a78"></circle><text x="648" y="230" font-size="11.5" fill="#c7c7d1" xml:space="preserve">generateSummary</text><rect x="628" y="242" width="220" height="22" rx="6" fill="#7c5cff" fill-opacity="0.12" stroke="#7c5cff" stroke-opacity="0.32"></rect><circle cx="638" cy="253" r="2.5" fill="#7c5cff"></circle><text x="648" y="256" font-size="11.5" fill="#a78bfa" xml:space="preserve">validateSection</text><rect x="628" y="268" width="220" height="22" rx="6" fill="#7c5cff" fill-opacity="0.12" stroke="#7c5cff" stroke-opacity="0.32"></rect><circle cx="638" cy="279" r="2.5" fill="#7c5cff"></circle><text x="648" y="282" font-size="11.5" fill="#a78bfa" xml:space="preserve">getProgress</text><line x1="628" y1="332" x2="848" y2="332" stroke="#2a2a38" stroke-width="1" stroke-dasharray="2 4"></line><text x="632" y="352" font-size="11" fill="#9a9aa8" xml:space="preserve">Validate per</text><text x="632" y="370" font-size="11" fill="#9a9aa8" xml:space="preserve">section + track progress</text><text x="738" y="410" font-size="11" fill="#6a6a78" text-anchor="middle" xml:space="preserve">Complex forms</text></svg>
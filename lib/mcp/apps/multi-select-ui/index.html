<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>Multi-Select Picker</title>
  <link rel="stylesheet" href="../shared/base.css">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="header">
    <div class="header-row">
      <h1 id="title">Loading…</h1>
      <span id="selection-info" class="selection-info" style="display: none">
        — <span id="selection-count">0 selected</span>
      </span>
      <button type="button" class="btn-primary" id="btn-send-selection" style="visibility: hidden">Send Selection</button>
    </div>
    <p class="subtitle" id="subtitle"></p>
  </div>

  <div class="filter-box">
    <input type="text" id="filter-input" placeholder="Filter…" autocomplete="off">
    <label class="select-all-toggle">
      <input type="checkbox" id="select-all">
      <span>Select all</span>
    </label>
  </div>

  <div id="results-container">
    <p class="empty-state" id="empty-state">Loading…</p>
  </div>

  <div id="status-bar" class="status-bar"></div>

  <script type="module" src="./app.js"></script>
</body>
</html>
